<!DOCTYPE html>
<html>
<head>
    <title>Reset 75-Day Challenge Data</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }
        h1 { margin-top: 0; color: #333; }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
        }
        .success { background: #d4edda; color: #155724; }
        .info { background: #d1ecf1; color: #0c5460; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover { background: #5568d3; }
        .danger { background: #dc3545; }
        .danger:hover { background: #c82333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Reset Data</h1>
        <div id="status" class="status info">
            Ready to reset all data
        </div>
        <button onclick="resetData()" class="danger">Reset All Data</button>
        <button onclick="window.location.href='index.html'">Back to App</button>
    </div>

    <script>
        function initData() {
            return {
                dailyGoalConfig: {
                    workout: { enabled: true, target: 60 },
                    water: { enabled: true, target: 8 },
                    reading: { enabled: true, target: 30 },
                    sleep: { enabled: true, target: 7 },
                    meditation: { enabled: false, target: 10 },
                    noAlcohol: { enabled: false },
                    diet: { enabled: false },
                    coldShower: { enabled: false }
                },
                dailyLogs: {},
                startDate: new Date().toISOString().split('T')[0],
                books: [],
                currentBookId: null,
                monthlyNotes: {},
                netWorthLogs: []
            };
        }

        async function resetData() {
            const confirmed = confirm('⚠️ This will delete ALL your data. Are you absolutely sure?');
            if (!confirmed) return;

            try {
                const empty = initData();

                // Reset localStorage
                localStorage.setItem('6mc-v2', JSON.stringify(empty));

                // If cloud sync is enabled, reset cloud data too
                const userId = localStorage.getItem('pp-sync-id');
                if (userId) {
                    document.getElementById('status').className = 'status info';
                    document.getElementById('status').textContent = 'Resetting cloud data...';

                    // Import cloud save function
                    const cloudSave = async (userId, data) => {
                        const response = await fetch('https://passion-project-sync.vercel.app/api/save', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ userId, data })
                        });
                        return response.json();
                    };

                    await cloudSave(userId, empty);
                }

                document.getElementById('status').className = 'status success';
                document.getElementById('status').textContent = '✅ All data has been reset! Cloud synced. Open the app on your phone to see the reset.';

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);

            } catch (error) {
                document.getElementById('status').className = 'status danger';
                document.getElementById('status').textContent = '❌ Error: ' + error.message;
            }
        }

        // Check current data
        window.addEventListener('load', () => {
            const data = localStorage.getItem('6mc-v2');
            const userId = localStorage.getItem('pp-sync-id');
            const synced = userId ? ' (Cloud sync enabled)' : ' (No cloud sync)';

            if (data) {
                const parsed = JSON.parse(data);
                const logCount = Object.keys(parsed.dailyLogs || {}).length;
                document.getElementById('status').textContent = `Found ${logCount} day logs${synced}`;
            }
        });
    </script>
</body>
</html>
