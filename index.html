<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6 Month Challenge</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        input[type=number]::-webkit-inner-spin-button { opacity: 1; }
    </style>
</head>
<body class="bg-slate-50">
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const CHALLENGE_START = '2026-03-01';
    const CHALLENGE_END   = '2026-08-31';
    const TOTAL_DAYS      = 184;
    const HYROX_DATE      = '2026-11-15';

    function fmtDate(d) {
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function parseD(s) { return new Date(s + 'T00:00:00'); }
    function isWeekend(s) { const d = parseD(s).getDay(); return d === 0 || d === 6; }
    function getWeekStart(s) {
        const d = parseD(s); const day = d.getDay();
        d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
        return fmtDate(d);
    }
    function getWeekDates(ws) {
        return Array.from({length:7}, (_,i) => { const d = parseD(ws); d.setDate(d.getDate()+i); return fmtDate(d); });
    }
    function daysBetween(a, b) { return Math.round((parseD(b) - parseD(a)) / 86400000); }

    const emptyDay = () => ({ gym:false, running:false, greenTea:false, outsideFood:false, cheatMeal:false, weight:null, studyHours:0, workHours:0 });
    const initData = () => ({ dailyLogs:{}, books:[], currentBookId:null, monthlyNotes:{} });

    // ─── APP ──────────────────────────────────────────────────────────────────
    function App() {
        const [view, setView] = useState('dashboard');
        const [data, setData] = useState(null);
        const today = fmtDate(new Date());

        useEffect(() => {
            try {
                const saved = localStorage.getItem('6mc-v2');
                setData(saved ? JSON.parse(saved) : initData());
            } catch { setData(initData()); }
        }, []);

        const persist = useCallback((nd) => {
            setData(nd);
            localStorage.setItem('6mc-v2', JSON.stringify(nd));
        }, []);

        const updateDay = useCallback((dateStr, updates) => {
            setData(prev => {
                const nd = { ...prev, dailyLogs: { ...prev.dailyLogs,
                    [dateStr]: { ...(prev.dailyLogs[dateStr] || emptyDay()), ...updates }
                }};
                localStorage.setItem('6mc-v2', JSON.stringify(nd));
                return nd;
            });
        }, []);

        if (!data) return <div className="flex items-center justify-center h-screen text-slate-400 text-lg">Loading…</div>;

        const todayD   = parseD(today);
        const startD   = parseD(CHALLENGE_START);
        const rawDay   = daysBetween(CHALLENGE_START, today) + 1;
        const challDay = Math.max(0, Math.min(rawDay, TOTAL_DAYS));
        const started  = today >= CHALLENGE_START;

        const TABS = [
            { id:'dashboard', label:'🏠 Home' },
            { id:'today',     label:'📅 Today' },
            { id:'progress',  label:'📊 Progress' },
            { id:'reading',   label:'📖 Reading' },
            { id:'goals',     label:'🎯 Goals' },
        ];

        return (
            <div className="min-h-screen bg-slate-50">
                {/* Header */}
                <div className="bg-white border-b border-slate-200 sticky top-0 z-20">
                    <div className="max-w-2xl mx-auto px-4 pt-4 pb-0 flex items-start justify-between">
                        <div>
                            <h1 className="text-lg font-bold text-slate-800 leading-tight">6 Month Challenge</h1>
                            <p className="text-xs text-slate-400 mt-0.5">
                                {started ? `Day ${challDay} of ${TOTAL_DAYS}` : `Starts ${CHALLENGE_START}`}
                            </p>
                        </div>
                        <div className="text-right text-xs text-slate-400 mt-1">
                            {new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
                        </div>
                    </div>
                    <div className="max-w-2xl mx-auto px-4 flex gap-0 overflow-x-auto">
                        {TABS.map(t => (
                            <button key={t.id} onClick={() => setView(t.id)}
                                className={`px-3 py-3 text-sm font-medium whitespace-nowrap border-b-2 transition-colors ${
                                    view===t.id ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>
                                {t.label}
                            </button>
                        ))}
                    </div>
                </div>

                <div className="max-w-2xl mx-auto px-4 py-6 pb-16">
                    {view==='dashboard' && <Dashboard data={data} today={today} challDay={challDay} />}
                    {view==='today'     && <TodayLog  data={data} today={today} updateDay={updateDay} />}
                    {view==='progress'  && <Progress  data={data} today={today} />}
                    {view==='reading'   && <Reading   data={data} save={persist} />}
                    {view==='goals'     && <Goals     data={data} save={persist} today={today} />}
                </div>
            </div>
        );
    }

    // ─── DASHBOARD ────────────────────────────────────────────────────────────
    function Dashboard({ data, today, challDay }) {
        const logs = data.dailyLogs;

        // Weight
        const wEntries = Object.entries(logs).filter(([_,l]) => l.weight).sort(([a],[b]) => a<b?-1:1);
        const latestW  = wEntries.length ? wEntries[wEntries.length-1][1].weight : null;
        const startW   = wEntries.length ? wEntries[0][1].weight : null;

        // Countdown
        const daysToJuly  = Math.max(0, daysBetween(today, '2026-07-01'));
        const daysToHyrox = Math.max(0, daysBetween(today, HYROX_DATE));

        // This week
        const ws   = getWeekStart(today);
        const wDates = getWeekDates(ws);
        const wk = {
            gym:      wDates.filter(d => logs[d]?.gym).length,
            running:  wDates.filter(d => logs[d]?.running).length,
            greenTea: wDates.filter(d => logs[d]?.greenTea).length,
            outside:  wDates.filter(d => logs[d]?.outsideFood).length,
            cheat:    wDates.filter(d => logs[d]?.cheatMeal).length,
            study:    wDates.reduce((s,d) => s + (parseFloat(logs[d]?.studyHours)||0), 0),
            work:     wDates.reduce((s,d) => s + (parseFloat(logs[d]?.workHours)||0), 0),
        };

        // Study goal days (met target)
        const allLogDates = Object.keys(logs).filter(d => d >= CHALLENGE_START);
        const studyDays   = allLogDates.filter(d => {
            const h = parseFloat(logs[d]?.studyHours)||0;
            return isWeekend(d) ? h >= 5 : h >= 3;
        }).length;

        // Current book
        const curBook     = data.books.find(b => b.id === data.currentBookId);
        const booksFinished = data.books.filter(b => b.finishedDate).length;

        // Study streak
        let streak = 0;
        const cd = new Date(parseD(today));
        for (let i = 0; i < 100; i++) {
            const ds = fmtDate(cd);
            const h  = parseFloat(logs[ds]?.studyHours)||0;
            const tgt = isWeekend(ds) ? 5 : 3;
            if (h >= tgt) { streak++; cd.setDate(cd.getDate()-1); }
            else break;
        }

        const pct = Math.min(100, ((challDay / TOTAL_DAYS)*100)).toFixed(0);

        return (
            <div className="space-y-5">
                {/* 4 Main Goals */}
                <div>
                    <p className="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">Main Goals</p>
                    <div className="grid grid-cols-2 gap-3">

                        {/* ISB */}
                        <GoalCard color="bg-blue-600">
                            <div className="text-2xl">🎓</div>
                            <div className="font-bold text-sm mt-1">Get into ISB</div>
                            <div className="text-3xl font-bold mt-1">{studyDays}</div>
                            <div className="text-xs opacity-75">study days ✓</div>
                            <MiniBar pct={(studyDays/TOTAL_DAYS)*100} />
                        </GoalCard>

                        {/* Weight */}
                        <GoalCard color="bg-emerald-600">
                            <div className="text-2xl">⚖️</div>
                            <div className="font-bold text-sm mt-1">78 kg by July</div>
                            {latestW ? (
                                <>
                                    <div className="text-3xl font-bold mt-1">{latestW}<span className="text-base font-normal"> kg</span></div>
                                    <div className="text-xs opacity-75">
                                        {startW && latestW < startW ? `↓ ${(startW-latestW).toFixed(1)}kg lost · ` : ''}
                                        {daysToJuly}d to go
                                    </div>
                                    <div className="text-xs opacity-60 mt-1">Hyrox 81-82kg · {daysToHyrox}d</div>
                                </>
                            ) : (
                                <>
                                    <div className="text-lg font-semibold mt-1 opacity-80">Log weight →</div>
                                    <div className="text-xs opacity-60">{daysToJuly} days to July</div>
                                </>
                            )}
                        </GoalCard>

                        {/* Reading */}
                        <GoalCard color="bg-amber-500">
                            <div className="text-2xl">📚</div>
                            <div className="font-bold text-sm mt-1">Reading Habit</div>
                            {curBook ? (
                                <>
                                    <div className="font-semibold text-sm mt-1 leading-tight truncate">{curBook.title}</div>
                                    <div className="text-xs opacity-75">p.{curBook.currentPage}/{curBook.totalPages}</div>
                                    <MiniBar pct={(curBook.currentPage/curBook.totalPages)*100} />
                                </>
                            ) : (
                                <>
                                    <div className="text-3xl font-bold mt-1">{booksFinished}</div>
                                    <div className="text-xs opacity-75">books finished</div>
                                </>
                            )}
                        </GoalCard>

                        {/* Work */}
                        <GoalCard color="bg-violet-600">
                            <div className="text-2xl">💼</div>
                            <div className="font-bold text-sm mt-1">Work First</div>
                            <div className="text-3xl font-bold mt-1">{wk.work.toFixed(1)}<span className="text-base font-normal">h</span></div>
                            <div className="text-xs opacity-75">focused this week</div>
                            <div className="text-xs opacity-60 mt-1">≈ {(wk.work/7).toFixed(1)}h/day avg</div>
                        </GoalCard>
                    </div>
                </div>

                {/* Challenge progress bar */}
                <div className="bg-white rounded-2xl p-5 border border-slate-100">
                    <div className="flex justify-between items-end mb-3">
                        <div>
                            <p className="font-semibold text-slate-800">6 Month Challenge</p>
                            <p className="text-xs text-slate-400">Mar 1 – Aug 31, 2026</p>
                        </div>
                        <div className="text-right">
                            <span className="text-2xl font-bold text-blue-600">{pct}%</span>
                            <p className="text-xs text-slate-400">Day {challDay}/{TOTAL_DAYS}</p>
                        </div>
                    </div>
                    <div className="bg-slate-100 rounded-full h-3">
                        <div className="bg-blue-600 rounded-full h-3 transition-all" style={{width:`${pct}%`}} />
                    </div>
                </div>

                {/* This Week */}
                <div className="bg-white rounded-2xl p-5 border border-slate-100">
                    <p className="font-semibold text-slate-800 mb-4">This Week</p>
                    <div className="space-y-3">
                        <HBar label="🏋️ Gym"       val={wk.gym}      max={4}  color="bg-emerald-500" />
                        <HBar label="🏃 Running"    val={wk.running}  max={4}  color="bg-sky-500" />
                        <HBar label="🍵 Green Tea"  val={wk.greenTea} max={5}  color="bg-teal-500" />
                        <HBar label="📚 Study"      val={wk.study}    max={21} color="bg-blue-500"    unit="h" dec={1} />
                        <HBar label="💼 Work"       val={wk.work}     max={40} color="bg-violet-500"  unit="h" dec={1} />
                    </div>
                    <div className="flex gap-4 mt-3 text-xs text-slate-400 pt-3 border-t border-slate-50">
                        <span>🍔 Outside food: {wk.outside}d</span>
                        <span>🎉 Cheat meals: {wk.cheat}</span>
                    </div>
                </div>

                {/* Streak */}
                {streak > 0 && (
                    <div className="bg-orange-50 border border-orange-200 rounded-2xl p-4 flex items-center gap-3">
                        <span className="text-3xl">🔥</span>
                        <div>
                            <p className="font-bold text-orange-700">{streak} Day Study Streak</p>
                            <p className="text-xs text-orange-500">You're on a roll. Don't break it.</p>
                        </div>
                    </div>
                )}

                {/* Quote */}
                <div className="bg-slate-800 text-white rounded-2xl p-5 text-center">
                    <p className="text-sm italic opacity-90 leading-relaxed">"We are what we repeatedly do. Excellence, then, is not an act but a habit."</p>
                    <p className="text-xs opacity-40 mt-2">— Aristotle</p>
                </div>
            </div>
        );
    }

    function GoalCard({ color, children }) {
        return <div className={`${color} text-white rounded-2xl p-4`}>{children}</div>;
    }
    function MiniBar({ pct }) {
        return (
            <div className="mt-2 bg-white/20 rounded-full h-1.5">
                <div className="bg-white rounded-full h-1.5" style={{width:`${Math.min(100,pct)}%`}} />
            </div>
        );
    }
    function HBar({ label, val, max, color, unit='', dec=0 }) {
        const pct = Math.min(100,(val/max)*100);
        const done = val >= max;
        return (
            <div>
                <div className="flex justify-between text-sm mb-1">
                    <span className="text-slate-600">{label}</span>
                    <span className={`font-semibold ${done?'text-emerald-600':'text-slate-500'}`}>
                        {dec ? val.toFixed(dec) : val}{unit} / {max}{unit} {done?'✓':''}
                    </span>
                </div>
                <div className="bg-slate-100 rounded-full h-2">
                    <div className={`${color} rounded-full h-2 transition-all`} style={{width:`${pct}%`}} />
                </div>
            </div>
        );
    }

    // ─── TODAY LOG ────────────────────────────────────────────────────────────
    function TodayLog({ data, today, updateDay }) {
        const log = data.dailyLogs[today] || emptyDay();
        const [studyInput, setStudyInput] = useState(log.studyHours || '');
        const [workInput,  setWorkInput]  = useState(log.workHours  || '');
        const [wInput,     setWInput]     = useState(log.weight     || '');

        // Keep inputs in sync if log changes externally
        useEffect(() => {
            setStudyInput(log.studyHours || '');
            setWorkInput(log.workHours   || '');
            setWInput(log.weight         || '');
        }, [today]);

        const toggle = f => updateDay(today, { [f]: !log[f] });
        const studyTarget = isWeekend(today) ? 5 : 3;
        const studyH = parseFloat(log.studyHours)||0;
        const workH  = parseFloat(log.workHours)||0;

        const goalsMet = [
            log.gym, log.running, log.greenTea,
            !log.outsideFood || log.cheatMeal,
            studyH >= studyTarget
        ].filter(Boolean).length;

        const dayLabel = parseD(today).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

        return (
            <div className="space-y-4">
                {/* Date header */}
                <div className="text-center pb-2">
                    <h2 className="text-xl font-bold text-slate-800">{dayLabel}</h2>
                    <p className="text-sm text-slate-400 mt-0.5">
                        {isWeekend(today) ? 'Weekend — 5h study goal' : 'Weekday — 3h study goal'}
                    </p>
                </div>

                {/* HEALTH */}
                <LogSection title="🏃 Health" accent="border-l-emerald-500">
                    <Toggle checked={log.gym}      onChange={() => toggle('gym')}      label="Gym"        sub="Strength session" />
                    <Toggle checked={log.running}  onChange={() => toggle('running')}  label="Running"    sub="Outdoor / cardio" />
                    <Toggle checked={log.greenTea} onChange={() => toggle('greenTea')} label="Green Tea"  sub="Had green tea today" />
                    <div className="grid grid-cols-2 gap-2 pt-1">
                        <Toggle checked={!log.outsideFood} onChange={() => toggle('outsideFood')} label="No outside food" sub="Home food only" />
                        <Toggle checked={log.cheatMeal}    onChange={() => toggle('cheatMeal')}   label="Cheat meal"     sub="1 per week ok" warn />
                    </div>

                    {/* Weight */}
                    <div className="pt-3 border-t border-slate-100 mt-1">
                        <label className="text-sm font-medium text-slate-700 block mb-2">⚖️ Weight today</label>
                        <div className="flex gap-2 items-center">
                            <input type="number" step="0.1" min="40" max="200"
                                value={wInput} onChange={e => setWInput(e.target.value)}
                                placeholder={log.weight ? String(log.weight) : "e.g. 84.5"}
                                className="flex-1 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500"
                            />
                            <span className="text-sm text-slate-400">kg</span>
                            <button onClick={() => { const w=parseFloat(wInput); if(!isNaN(w)) updateDay(today,{weight:w}); }}
                                className="px-4 py-2.5 bg-emerald-600 text-white text-sm rounded-xl font-medium hover:bg-emerald-700 transition">
                                Save
                            </button>
                        </div>
                        {log.weight && <p className="text-xs text-emerald-600 mt-1.5">✓ {log.weight} kg logged</p>}
                    </div>
                </LogSection>

                {/* STUDIES */}
                <LogSection title="📚 Studies — ISB Prep" accent="border-l-blue-500">
                    <div>
                        <div className="flex justify-between items-center mb-2">
                            <label className="text-sm font-medium text-slate-700">Hours studied today</label>
                            <span className="text-xs text-slate-400">Goal: {studyTarget}h</span>
                        </div>
                        <div className="flex gap-2 items-center">
                            <input type="number" step="0.5" min="0" max="16"
                                value={studyInput} onChange={e => setStudyInput(e.target.value)}
                                placeholder="0"
                                className="flex-1 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-blue-500"
                            />
                            <span className="text-sm text-slate-400">hrs</span>
                            <button onClick={() => { const h=parseFloat(studyInput); if(!isNaN(h)) updateDay(today,{studyHours:h}); }}
                                className="px-4 py-2.5 bg-blue-600 text-white text-sm rounded-xl font-medium hover:bg-blue-700 transition">
                                Save
                            </button>
                        </div>
                        {studyH > 0 && (
                            <p className={`text-xs mt-1.5 ${studyH>=studyTarget ? 'text-emerald-600' : 'text-amber-600'}`}>
                                {studyH>=studyTarget ? `✓ Goal met! ${studyH}h logged` : `${studyH}h logged — ${(studyTarget-studyH).toFixed(1)}h to go`}
                            </p>
                        )}
                    </div>
                    <p className="text-xs text-slate-400">GMAT prep / case studies / essays / profile building</p>
                </LogSection>

                {/* WORK */}
                <LogSection title="💼 Focused Work" accent="border-l-violet-500">
                    <div>
                        <label className="text-sm font-medium text-slate-700 block mb-2">Hours of deep work today</label>
                        <div className="flex gap-2 items-center">
                            <input type="number" step="0.5" min="0" max="16"
                                value={workInput} onChange={e => setWorkInput(e.target.value)}
                                placeholder="0"
                                className="flex-1 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-violet-500"
                            />
                            <span className="text-sm text-slate-400">hrs</span>
                            <button onClick={() => { const h=parseFloat(workInput); if(!isNaN(h)) updateDay(today,{workHours:h}); }}
                                className="px-4 py-2.5 bg-violet-600 text-white text-sm rounded-xl font-medium hover:bg-violet-700 transition">
                                Save
                            </button>
                        </div>
                        {workH > 0 && <p className="text-xs text-violet-600 mt-1.5">✓ {workH}h focused work logged</p>}
                    </div>
                    <p className="text-xs text-slate-400">No distractions — phone away, full focus sessions only</p>
                </LogSection>

                {/* Day score */}
                <div className={`rounded-2xl p-4 text-center border ${goalsMet >= 4 ? 'bg-emerald-50 border-emerald-200' : goalsMet >= 2 ? 'bg-amber-50 border-amber-200' : 'bg-slate-50 border-slate-200'}`}>
                    <div className="text-3xl mb-1">{goalsMet >= 5 ? '🔥' : goalsMet >= 3 ? '💪' : '⏳'}</div>
                    <p className={`font-bold ${goalsMet>=4?'text-emerald-700':goalsMet>=2?'text-amber-700':'text-slate-500'}`}>
                        {goalsMet}/5 goals hit today
                    </p>
                    <p className="text-xs text-slate-400 mt-0.5">
                        {goalsMet===5 ? 'Absolutely elite. Perfect day!' : goalsMet>=3 ? 'Solid effort. Push further.' : 'Every bit counts. Keep moving.'}
                    </p>
                </div>
            </div>
        );
    }

    function LogSection({ title, accent, children }) {
        return (
            <div className={`bg-white rounded-2xl p-5 border border-slate-100 border-l-4 ${accent}`}>
                <h3 className="font-semibold text-slate-800 mb-3">{title}</h3>
                <div className="space-y-2">{children}</div>
            </div>
        );
    }

    function Toggle({ checked, onChange, label, sub, warn }) {
        return (
            <div className={`flex items-center gap-3 p-3 rounded-xl cursor-pointer select-none transition-colors ${
                checked ? (warn ? 'bg-orange-50' : 'bg-emerald-50') : 'bg-slate-50 hover:bg-slate-100'
            }`} onClick={onChange}>
                <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-colors ${
                    checked ? (warn ? 'bg-orange-400 border-orange-400' : 'bg-emerald-500 border-emerald-500') : 'border-slate-300'
                }`}>
                    {checked && <span className="text-white text-xs font-bold">✓</span>}
                </div>
                <div>
                    <p className={`text-sm font-medium leading-tight ${checked ? (warn?'text-orange-700':'text-emerald-700') : 'text-slate-700'}`}>{label}</p>
                    {sub && <p className="text-xs text-slate-400">{sub}</p>}
                </div>
            </div>
        );
    }

    // ─── PROGRESS ─────────────────────────────────────────────────────────────
    function Progress({ data, today }) {
        const logs = data.dailyLogs;

        // Weight entries for chart
        const wEntries = Object.entries(logs).filter(([_,l]) => l.weight).sort(([a],[b]) => a<b?-1:1);

        // Last 14 days
        const last14 = Array.from({length:14}, (_,i) => {
            const d = parseD(today); d.setDate(d.getDate()-13+i);
            const ds = fmtDate(d);
            const l  = logs[ds] || {};
            return { ds, label: d.toLocaleDateString('en-US',{weekday:'short', day:'numeric'}),
                gym: l.gym||false, running: l.running||false, greenTea: l.greenTea||false,
                study: parseFloat(l.studyHours)||0, work: parseFloat(l.workHours)||0,
                weight: l.weight||null, outside: l.outsideFood||false };
        });

        // Monthly breakdown
        const months = [
            {key:'2026-03',label:'March'},{key:'2026-04',label:'April'},{key:'2026-05',label:'May'},
            {key:'2026-06',label:'June'},{key:'2026-07',label:'July'},{key:'2026-08',label:'August'}
        ];
        const mStats = k => {
            const ents = Object.entries(logs).filter(([d]) => d.startsWith(k));
            return {
                days:  ents.length,
                gym:   ents.filter(([_,l])=>l.gym).length,
                run:   ents.filter(([_,l])=>l.running).length,
                tea:   ents.filter(([_,l])=>l.greenTea).length,
                study: ents.reduce((s,[_,l])=>s+(parseFloat(l.studyHours)||0),0),
                work:  ents.reduce((s,[_,l])=>s+(parseFloat(l.workHours)||0),0),
            };
        };

        return (
            <div className="space-y-5">
                {/* Weight chart */}
                <div className="bg-white rounded-2xl p-5 border border-slate-100">
                    <div className="flex justify-between items-center mb-1">
                        <p className="font-semibold text-slate-800">⚖️ Weight Progress</p>
                        {wEntries.length > 0 && (
                            <span className="text-xs text-slate-400">{wEntries.length} entries</span>
                        )}
                    </div>
                    <div className="flex gap-4 text-xs mb-4">
                        <span className="text-amber-600 font-medium">─ 78kg target (July)</span>
                        <span className="text-violet-500 font-medium">─ 81kg (Hyrox)</span>
                    </div>
                    {wEntries.length < 2 ? (
                        <div className="py-10 text-center text-slate-400 text-sm">
                            Log your weight daily to see your progress chart here.
                        </div>
                    ) : (
                        <WeightChart entries={wEntries} />
                    )}
                </div>

                {/* 14-day grid */}
                <div className="bg-white rounded-2xl p-5 border border-slate-100">
                    <p className="font-semibold text-slate-800 mb-4">Last 14 Days</p>
                    <div className="overflow-x-auto">
                        <table className="w-full text-xs">
                            <thead>
                                <tr className="text-slate-400 border-b border-slate-100">
                                    <th className="text-left pb-2 pr-2">Date</th>
                                    <th className="pb-2 px-1">💪</th>
                                    <th className="pb-2 px-1">🏃</th>
                                    <th className="pb-2 px-1">🍵</th>
                                    <th className="pb-2 px-1">🍔</th>
                                    <th className="pb-2 px-1">📚h</th>
                                    <th className="pb-2 px-1">💼h</th>
                                    <th className="pb-2 px-1">⚖️</th>
                                </tr>
                            </thead>
                            <tbody>
                                {last14.map(d => (
                                    <tr key={d.ds} className={`border-t border-slate-50 ${d.ds===today?'font-bold bg-blue-50':''}`}>
                                        <td className="py-1.5 pr-2 text-slate-600 whitespace-nowrap">{d.label}</td>
                                        <td className="py-1.5 px-1 text-center">{d.gym?'✅':'·'}</td>
                                        <td className="py-1.5 px-1 text-center">{d.running?'✅':'·'}</td>
                                        <td className="py-1.5 px-1 text-center">{d.greenTea?'✅':'·'}</td>
                                        <td className="py-1.5 px-1 text-center">{d.outside?'❌':'·'}</td>
                                        <td className={`py-1.5 px-1 text-center ${d.study>0?'text-blue-600':''}`}>{d.study||'·'}</td>
                                        <td className={`py-1.5 px-1 text-center ${d.work>0?'text-violet-600':''}`}>{d.work||'·'}</td>
                                        <td className={`py-1.5 px-1 text-center ${d.weight?'text-emerald-600':''}`}>{d.weight||'·'}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>

                {/* Monthly */}
                <div className="bg-white rounded-2xl p-5 border border-slate-100">
                    <p className="font-semibold text-slate-800 mb-4">Monthly Breakdown</p>
                    <div className="space-y-3">
                        {months.map(m => {
                            const s = mStats(m.key);
                            const cur = today.startsWith(m.key);
                            const past = m.key < today.substring(0,7);
                            return (
                                <div key={m.key} className={`p-3 rounded-xl transition ${cur?'bg-blue-50 border border-blue-200':past?'bg-slate-50':' bg-slate-50 opacity-40'}`}>
                                    <div className="flex justify-between items-center mb-2">
                                        <span className={`text-sm font-semibold ${cur?'text-blue-700':'text-slate-700'}`}>
                                            {m.label}{cur?' ← now':''}
                                        </span>
                                        <span className="text-xs text-slate-400">{s.days} days logged</span>
                                    </div>
                                    {s.days > 0 && (
                                        <div className="grid grid-cols-5 gap-1 text-center text-xs">
                                            <Stat v={s.gym}   label="gym"   c="text-emerald-600" />
                                            <Stat v={s.run}   label="runs"  c="text-sky-600" />
                                            <Stat v={s.tea}   label="🍵"    c="text-teal-600" />
                                            <Stat v={`${s.study.toFixed(0)}h`} label="study" c="text-blue-600" />
                                            <Stat v={`${s.work.toFixed(0)}h`}  label="work"  c="text-violet-600" />
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            </div>
        );
    }

    function Stat({ v, label, c }) {
        return <div><div className={`font-bold ${c}`}>{v}</div><div className="text-slate-400">{label}</div></div>;
    }

    function WeightChart({ entries }) {
        const ref = useRef(null);
        const ch  = useRef(null);
        useEffect(() => {
            if (!ref.current) return;
            if (ch.current) ch.current.destroy();
            const labels  = entries.map(([d]) => parseD(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}));
            const weights = entries.map(([_,l]) => l.weight);
            const mn = Math.max(60, Math.min(...weights)-3);
            ch.current = new Chart(ref.current, {
                type:'line',
                data:{ labels, datasets:[
                    { label:'Weight', data:weights, borderColor:'#10b981', backgroundColor:'rgba(16,185,129,0.07)',
                      tension:0.4, fill:true, pointRadius:3, pointBackgroundColor:'#10b981' },
                    { label:'78kg target', data:Array(labels.length).fill(78), borderColor:'#f59e0b',
                      borderDash:[6,3], pointRadius:0, fill:false },
                    { label:'81kg (Hyrox)', data:Array(labels.length).fill(81), borderColor:'#8b5cf6',
                      borderDash:[4,4], pointRadius:0, fill:false },
                ]},
                options:{ responsive:true,
                    plugins:{ legend:{display:false}, tooltip:{mode:'index'} },
                    scales:{
                        y:{ min:mn, grid:{color:'#f1f5f9'}, ticks:{callback:v=>`${v}kg`} },
                        x:{ grid:{display:false}, ticks:{maxRotation:0, maxTicksLimit:8} }
                    }
                }
            });
            return () => ch.current?.destroy();
        }, [entries]);
        return <canvas ref={ref} height="180" />;
    }

    // ─── READING ──────────────────────────────────────────────────────────────
    function Reading({ data, save }) {
        const [showAdd, setShowAdd]   = useState(false);
        const [title, setTitle]       = useState('');
        const [pages, setPages]       = useState('');
        const [pageInputs, setPageInputs] = useState({});

        const addBook = () => {
            if (!title.trim() || !pages) return;
            const book = { id:Date.now(), title:title.trim(), totalPages:parseInt(pages),
                currentPage:0, startDate:fmtDate(new Date()), finishedDate:null };
            save({ ...data, books:[...data.books, book], currentBookId:book.id });
            setTitle(''); setPages(''); setShowAdd(false);
        };

        const updatePage = (bookId) => {
            const p = parseInt(pageInputs[bookId]);
            if (isNaN(p) || p < 0) return;
            const book = data.books.find(b => b.id===bookId);
            const newPage = Math.min(p, book.totalPages);
            const done = newPage >= book.totalPages;
            save({ ...data,
                books: data.books.map(b => b.id===bookId
                    ? { ...b, currentPage:newPage, finishedDate: done&&!b.finishedDate ? fmtDate(new Date()) : b.finishedDate }
                    : b),
                currentBookId: done && data.currentBookId===bookId ? null : data.currentBookId
            });
            setPageInputs(p => ({...p, [bookId]:''}));
        };

        const active   = data.books.filter(b => !b.finishedDate);
        const finished = data.books.filter(b =>  b.finishedDate);

        return (
            <div className="space-y-4">
                <div className="flex justify-between items-center">
                    <h2 className="text-xl font-bold text-slate-800">📖 Reading Tracker</h2>
                    <button onClick={() => setShowAdd(!showAdd)}
                        className="px-4 py-2 bg-amber-500 text-white text-sm rounded-xl font-medium hover:bg-amber-600 transition">
                        + Add Book
                    </button>
                </div>

                {showAdd && (
                    <div className="bg-white rounded-2xl p-5 border border-amber-200 border-l-4 border-l-amber-500">
                        <h3 className="font-semibold text-slate-800 mb-3">New Book</h3>
                        <div className="space-y-2">
                            <input type="text" value={title} onChange={e=>setTitle(e.target.value)}
                                placeholder="Book title" onKeyDown={e=>e.key==='Enter'&&addBook()}
                                className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-amber-500" />
                            <input type="number" value={pages} onChange={e=>setPages(e.target.value)}
                                placeholder="Total pages"
                                className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-amber-500" />
                            <div className="flex gap-2">
                                <button onClick={addBook} className="flex-1 py-2.5 bg-amber-500 text-white text-sm rounded-xl font-medium hover:bg-amber-600 transition">Add Book</button>
                                <button onClick={()=>setShowAdd(false)} className="px-4 py-2.5 bg-slate-100 text-slate-600 text-sm rounded-xl hover:bg-slate-200 transition">Cancel</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* Active books */}
                {active.map(book => {
                    const pct = book.totalPages > 0 ? (book.currentPage/book.totalPages*100) : 0;
                    const cur = book.id === data.currentBookId;
                    return (
                        <div key={book.id} className={`bg-white rounded-2xl p-5 border ${cur?'border-amber-300 border-l-4 border-l-amber-500':'border-slate-100'}`}>
                            <div className="flex justify-between items-start mb-3">
                                <div className="flex-1 pr-3">
                                    <h4 className="font-semibold text-slate-800">{book.title}</h4>
                                    <p className="text-xs text-slate-400 mt-0.5">Started {book.startDate}</p>
                                </div>
                                {cur
                                    ? <span className="text-xs bg-amber-100 text-amber-700 px-2 py-1 rounded-lg font-medium">Reading now</span>
                                    : <button onClick={() => save({...data, currentBookId:book.id})}
                                        className="text-xs text-amber-600 border border-amber-300 px-2 py-1 rounded-lg hover:bg-amber-50 transition">
                                        Set current
                                      </button>
                                }
                            </div>

                            <div className="mb-3">
                                <div className="flex justify-between text-xs text-slate-500 mb-1.5">
                                    <span>Page {book.currentPage} of {book.totalPages}</span>
                                    <span className="font-semibold">{pct.toFixed(0)}%</span>
                                </div>
                                <div className="bg-slate-100 rounded-full h-3">
                                    <div className="bg-amber-500 rounded-full h-3 transition-all" style={{width:`${pct}%`}} />
                                </div>
                                {book.totalPages - book.currentPage > 0 && (
                                    <p className="text-xs text-slate-400 mt-1">{book.totalPages - book.currentPage} pages left</p>
                                )}
                            </div>

                            <div className="flex gap-2">
                                <input type="number" min="0" max={book.totalPages}
                                    value={pageInputs[book.id]||''}
                                    onChange={e => setPageInputs(p=>({...p,[book.id]:e.target.value}))}
                                    onKeyDown={e => e.key==='Enter' && updatePage(book.id)}
                                    placeholder={`Update page (now: ${book.currentPage})`}
                                    className="flex-1 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-amber-500" />
                                <button onClick={() => updatePage(book.id)}
                                    className="px-4 py-2.5 bg-amber-500 text-white text-sm rounded-xl font-medium hover:bg-amber-600 transition">
                                    Update
                                </button>
                            </div>
                        </div>
                    );
                })}

                {/* Finished */}
                {finished.length > 0 && (
                    <div className="bg-white rounded-2xl p-5 border border-slate-100">
                        <p className="font-semibold text-slate-800 mb-3">✅ Finished — {finished.length} book{finished.length>1?'s':''}</p>
                        <div className="space-y-2">
                            {finished.map(b => (
                                <div key={b.id} className="flex items-center gap-3 p-2">
                                    <span className="text-lg">📗</span>
                                    <div>
                                        <p className="text-sm font-medium text-slate-700">{b.title}</p>
                                        <p className="text-xs text-slate-400">Finished {b.finishedDate} · {b.totalPages} pages</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {data.books.length === 0 && !showAdd && (
                    <div className="text-center py-16 text-slate-400">
                        <div className="text-5xl mb-3">📚</div>
                        <p className="font-medium">No books yet</p>
                        <p className="text-sm mt-1">Hit "Add Book" to start tracking your reading habit.</p>
                    </div>
                )}
            </div>
        );
    }

    // ─── GOALS ────────────────────────────────────────────────────────────────
    function Goals({ data, save, today }) {
        const [editKey, setEditKey]     = useState(null);
        const [editNotes, setEditNotes] = useState({ health:'', studies:'', work:'' });

        const MONTHS = [
            { key:'2026-03', label:'March 2026',     theme:'Build the foundation' },
            { key:'2026-04', label:'April 2026',     theme:'Consistency over intensity' },
            { key:'2026-05', label:'May 2026',       theme:'Momentum builds' },
            { key:'2026-06', label:'June 2026',      theme:'Final push on weight' },
            { key:'2026-07', label:'July 2026 🎯',   theme:'78 kg target — then rebuild' },
            { key:'2026-08', label:'August 2026',    theme:'ISB application season' },
        ];

        const startEdit = k => {
            setEditNotes(data.monthlyNotes?.[k] || { health:'', studies:'', work:'' });
            setEditKey(k);
        };
        const saveEdit = () => {
            save({ ...data, monthlyNotes: { ...(data.monthlyNotes||{}), [editKey]: editNotes } });
            setEditKey(null);
        };

        const cur = today.substring(0,7);

        return (
            <div className="space-y-4">
                <div>
                    <h2 className="text-xl font-bold text-slate-800 mb-1">Goals</h2>
                    <p className="text-sm text-slate-400">Your fixed weekly targets + monthly focus areas.</p>
                </div>

                {/* Fixed weekly targets */}
                <div className="bg-white rounded-2xl p-5 border border-slate-100 border-l-4 border-l-slate-400">
                    <p className="font-semibold text-slate-800 mb-4">📋 Weekly Non-Negotiables</p>
                    <div className="space-y-3">
                        {[
                            { icon:'🏋️', label:'Gym', target:'4 sessions per week' },
                            { icon:'🏃', label:'Running', target:'4 runs per week' },
                            { icon:'🍵', label:'Green Tea', target:'5 days per week' },
                            { icon:'🍱', label:'No outside food', target:'6 days out of 7  ·  1 cheat meal allowed' },
                            { icon:'📚', label:'Study — ISB prep', target:'3h weekdays  ·  5h weekends  (≥21h/week)' },
                            { icon:'💼', label:'Focused work', target:'Log daily — aim for 8h deep work' },
                            { icon:'📖', label:'Reading', target:'Read daily, log pages, finish books' },
                        ].map(r => (
                            <div key={r.label} className="flex items-start gap-3">
                                <span className="text-lg mt-0.5 w-6 flex-shrink-0">{r.icon}</span>
                                <div>
                                    <p className="text-sm font-medium text-slate-700">{r.label}</p>
                                    <p className="text-xs text-slate-400">{r.target}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>

                {/* Main goals */}
                <div className="bg-white rounded-2xl p-5 border border-slate-100">
                    <p className="font-semibold text-slate-800 mb-4">🎯 The 4 Big Goals</p>
                    <div className="space-y-3">
                        {[
                            { c:'bg-blue-600',   label:'Get into ISB 2026', desc:'GMAT, profile, essays, applications — give it everything.' },
                            { c:'bg-emerald-600', label:'78 kg by July, 81-82 kg for Hyrox', desc:'Cut to 78 by July. Then lean bulk to Hyrox performance weight.' },
                            { c:'bg-amber-500',   label:'Inculcate reading as a habit', desc:'Read consistently. At least one book per month. Build the discipline.' },
                            { c:'bg-violet-600',  label:'Work professionally — keep it a priority', desc:'Show up fully. Log deep work. Treat it with the same seriousness as studies.' },
                        ].map(g => (
                            <div key={g.label} className="flex items-start gap-3">
                                <div className={`w-2.5 h-2.5 rounded-full mt-1.5 flex-shrink-0 ${g.c}`} />
                                <div>
                                    <p className="text-sm font-semibold text-slate-800">{g.label}</p>
                                    <p className="text-xs text-slate-500 mt-0.5 leading-relaxed">{g.desc}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>

                {/* Monthly notes */}
                <p className="text-xs font-semibold text-slate-400 uppercase tracking-widest pt-2">Monthly Focus</p>
                {MONTHS.map(m => {
                    const notes    = data.monthlyNotes?.[m.key];
                    const hasNotes = notes && (notes.health || notes.studies || notes.work);
                    const isCur    = m.key === cur;
                    const isPast   = m.key < cur;
                    const isEdit   = editKey === m.key;

                    return (
                        <div key={m.key} className={`bg-white rounded-2xl p-5 border transition ${
                            isCur ? 'border-blue-200 border-l-4 border-l-blue-500' : 'border-slate-100'
                        } ${!isPast && !isCur ? 'opacity-50' : ''}`}>
                            <div className="flex justify-between items-start mb-1">
                                <div>
                                    <p className="font-semibold text-slate-800">{m.label}</p>
                                    <p className="text-xs text-slate-400 italic">{m.theme}</p>
                                </div>
                                <button onClick={() => isEdit ? setEditKey(null) : startEdit(m.key)}
                                    className="text-xs text-blue-600 border border-blue-200 px-2.5 py-1 rounded-lg hover:bg-blue-50 transition">
                                    {isEdit ? 'Cancel' : 'Edit'}
                                </button>
                            </div>

                            {isEdit ? (
                                <div className="mt-3 space-y-2">
                                    {[
                                        {k:'health',  label:'🏃 Health goals', color:'focus:border-emerald-500'},
                                        {k:'studies', label:'📚 Study goals',  color:'focus:border-blue-500'},
                                        {k:'work',    label:'💼 Work goals',   color:'focus:border-violet-500'},
                                    ].map(f => (
                                        <div key={f.k}>
                                            <label className="text-xs font-medium text-slate-500 block mb-1">{f.label}</label>
                                            <textarea rows="2" value={editNotes[f.k]||''}
                                                onChange={e => setEditNotes(p=>({...p,[f.k]:e.target.value}))}
                                                placeholder="Set a specific target for this month…"
                                                className={`w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none resize-none ${f.color}`} />
                                        </div>
                                    ))}
                                    <button onClick={saveEdit}
                                        className="w-full py-2.5 bg-blue-600 text-white text-sm rounded-xl font-medium hover:bg-blue-700 transition">
                                        Save Goals
                                    </button>
                                </div>
                            ) : hasNotes ? (
                                <div className="mt-3 space-y-2">
                                    {notes.health  && <NoteBlock label="Health"  text={notes.health}  c="text-emerald-600" />}
                                    {notes.studies && <NoteBlock label="Studies" text={notes.studies} c="text-blue-600" />}
                                    {notes.work    && <NoteBlock label="Work"    text={notes.work}    c="text-violet-600" />}
                                </div>
                            ) : (
                                <p className="text-sm text-slate-400 mt-2 italic">No goals set — click Edit to add.</p>
                            )}
                        </div>
                    );
                })}
            </div>
        );
    }

    function NoteBlock({ label, text, c }) {
        return (
            <div>
                <span className={`text-xs font-semibold ${c}`}>{label}</span>
                <p className="text-sm text-slate-600 mt-0.5 leading-relaxed">{text}</p>
            </div>
        );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
