    <style>
        html, body { overflow-x: hidden; max-width: 100vw; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding-bottom: env(safe-area-inset-bottom); }
        input[type=number]::-webkit-inner-spin-button { opacity: 1; }
        * { box-sizing: border-box; }
        img { max-width: 100%; height: auto; }
        /* Prevent text overflow */
        .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        /* Word break for long text */
        .break-words { word-wrap: break-word; word-break: break-word; }
        /* Color dots */
        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            position: absolute;
            top: 16px;
            right: 16px;
        }
        /* Dark mode */
        .dark body                          { background-color: #020617; }
        .dark .bg-slate-50                  { background-color: #020617 !important; }
        .dark .bg-white                     { background-color: #1e293b !important; }
        .dark .bg-slate-100                 { background-color: #334155 !important; }
        .dark .bg-slate-800                 { background-color: #334155 !important; }
        .dark .text-slate-800               { color: #f1f5f9 !important; }
        .dark .text-slate-700               { color: #e2e8f0 !important; }
        .dark .text-slate-600               { color: #cbd5e1 !important; }
        .dark .text-slate-500               { color: #94a3b8 !important; }
        .dark .text-slate-400               { color: #64748b !important; }
        .dark .border-slate-100             { border-color: #334155 !important; }
        .dark .border-slate-200             { border-color: #475569 !important; }
        .dark .border-slate-300             { border-color: #64748b !important; }
        .dark input, .dark textarea         { background-color: #0f172a !important; color: #f1f5f9 !important; border-color: #475569 !important; }
        .dark select                        { background-color: #0f172a !important; color: #f1f5f9 !important; border-color: #475569 !important; }
        .dark .bg-orange-50                 { background-color: #431407 !important; }
        .dark .border-orange-200            { border-color: #9a3412 !important; }
        .dark .bg-blue-50                   { background-color: #0c1a3b !important; }
        .dark .border-blue-200              { border-color: #1d4ed8 !important; }
        .dark .bg-amber-50                  { background-color: #3b2000 !important; }
        .dark .border-amber-200             { border-color: #b45309 !important; }
        .dark .border-amber-300             { border-color: #d97706 !important; }
        .dark .bg-emerald-50                { background-color: #052e16 !important; }
        .dark .bg-green-50                  { background-color: #052e16 !important; }
        .dark .border-green-200             { border-color: #16a34a !important; }
        .dark .bg-red-50                    { background-color: #2e0a0a !important; }
        .dark .border-red-200               { border-color: #dc2626 !important; }
        .dark .hover\:bg-slate-100:hover    { background-color: #334155 !important; }
        .dark .hover\:bg-slate-200:hover    { background-color: #475569 !important; }
        .dark .hover\:bg-slate-50:hover     { background-color: #1e293b !important; }
    </style>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
        }
        const firebaseConfig = {
            apiKey: "AIzaSyC5OgqzgIJ6vCGuIiOnu5EjqMOusO2Abu4",
            authDomain: "life---all-in-one-app.firebaseapp.com",
            projectId: "life---all-in-one-app",
            storageBucket: "life---all-in-one-app.firebasestorage.app",
            messagingSenderId: "487066259508",
            appId: "1:487066259508:web:9a72006b845e6524c0ba61"
        };
        firebase.initializeApp(firebaseConfig);
        const _db = firebase.firestore();
        let _syncTimer = null;
        window._cloudSave = function(userId, data) {
            if (window._setSyncStatus) window._setSyncStatus('syncing');
            clearTimeout(_syncTimer);
            _syncTimer = setTimeout(function() {
                _db.collection('users').doc(userId).set(JSON.parse(JSON.stringify(data)))
                    .then(function() { if (window._setSyncStatus) window._setSyncStatus('synced'); })
                    .catch(function() { if (window._setSyncStatus) window._setSyncStatus('offline'); });
            }, 1500);
        };
        window._cloudLoad = function(userId) {
            return _db.collection('users').doc(userId).get()
                .then(function(doc) { return doc.exists ? doc.data() : null; })
                .catch(function() { return null; });
        };
    </script>
</head>
<body class="bg-slate-50">
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const CHALLENGE_START = '2026-02-26';
    const TOTAL_DAYS      = 189;
    const HYROX_DATE      = '2026-04-12';
    const HYROX_WEIGHT    = 81;
    const NW_GOAL         = 600000;

    const MONTHS = [
        { key:'2026-02', label:'Feb 2026', theme:'Light the fire' },
        { key:'2026-03', label:'March 2026', theme:'Build the foundation' },
        { key:'2026-04', label:'April 2026', theme:'Consistency over intensity' },
        { key:'2026-05', label:'May 2026', theme:'Momentum builds' },
        { key:'2026-06', label:'June 2026', theme:'Final push on weight' },
        { key:'2026-07', label:'July 2026 🎯', theme:'78 kg target — then rebuild' },
        { key:'2026-08', label:'August 2026', theme:'ISB application season' },
    ];

    // ── Helpers ──────────────────────────────────────────────────────────────
    const fmtDate = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const fmtPace = p => { if(!p||p<=0) return '—'; const m=Math.floor(p); const s=Math.round((p-m)*60); return `${m}:${String(s).padStart(2,'0')} /km`; };
    const parseD  = s => new Date(s + 'T00:00:00');
    const isWeekend = s => { const d = parseD(s).getDay(); return d===0||d===6; };
    const daysBetween = (a,b) => Math.round((parseD(b)-parseD(a))/86400000);
    function getWeekStart(s) {
        const d = parseD(s), day = d.getDay();
        d.setDate(d.getDate()-(day===0?6:day-1)); return fmtDate(d);
    }
    function getWeekDates(ws) {
        return Array.from({length:7},(_,i)=>{const d=parseD(ws);d.setDate(d.getDate()+i);return fmtDate(d);});
    }
    function fmtMoney(n, priv) {
        if (priv) return '₹ ••••';
        if (n >= 100000) return `₹${(n/100000).toFixed(2)}L`;
        if (n >= 1000)   return `₹${(n/1000).toFixed(1)}k`;
        return `₹${n.toLocaleString('en-IN')}`;
    }
    const calcNW = e => (e.demat||0)+(e.crypto||0)+(e.bank||0)-(e.creditCard||0);

    function weekStats(logs, weekStart) {
        const dates = getWeekDates(weekStart);
        return {
            gymSessions: dates.filter(d => logs[d]?.gym).length,
            runKm:       dates.reduce((s,d) => s+(parseFloat(logs[d]?.runKm)||0), 0),
            studyHours:  dates.reduce((s,d) => s+(parseFloat(logs[d]?.studyHours)||0), 0),
            pagesRead:   dates.reduce((s,d) => s+(parseInt(logs[d]?.pagesRead)||0), 0),
        };
    }
    function monthStats(logs, monthKey) {
        const entries = Object.entries(logs).filter(([d]) => d.startsWith(monthKey));
        return {
            gymSessions: entries.filter(([,l]) => l.gym).length,
            runKm:       entries.reduce((s,[,l]) => s+(parseFloat(l.runKm)||0), 0),
            studyHours:  entries.reduce((s,[,l]) => s+(parseFloat(l.studyHours)||0), 0),
            pagesRead:   entries.reduce((s,[,l]) => s+(parseInt(l.pagesRead)||0), 0),
        };
    }
    function dailyGoalsHit(log, cfg, dateStr) {
        const studyT = isWeekend(dateStr) ? 5 : 3;
        let hit = 0, total = 0;
        total++; if(log.gym || log.running) hit++; // Gym OR Running counts
        if((cfg.runKm||0) > 0) { total++; if((parseFloat(log.runKm)||0) >= cfg.runKm) hit++; }
        { total++; if((parseFloat(log.studyHours)||0) >= (cfg.studyHours||studyT)) hit++; }
        if((cfg.pagesRead||0) > 0) { total++; if((parseInt(log.pagesRead)||0) >= cfg.pagesRead) hit++; }
        (cfg.custom||[]).forEach(g => {
            total++;
            if(g.type==='boolean') { if(log[`cg_${g.id}`]) hit++; }
            else { if((parseFloat(log[`cg_${g.id}`])||0) >= (g.target||1)) hit++; }
        });
        return { hit, total };
    }
    function weekGoalsHit(logs, weekStart, wg) {
        if(!wg) return { hit:0, total:0 };
        const ws = weekStats(logs, weekStart);
        let hit = 0, total = 0;
        if((wg.gymSessions||0)>0) { total++; if(ws.gymSessions >= wg.gymSessions) hit++; }
        if((wg.runKm||0)>0)       { total++; if(ws.runKm       >= wg.runKm)       hit++; }
        if((wg.studyHours||0)>0)  { total++; if(ws.studyHours  >= wg.studyHours)  hit++; }
        if((wg.pagesRead||0)>0)   { total++; if(ws.pagesRead   >= wg.pagesRead)   hit++; }
        return { hit, total };
    }
    function monthGoalsHit(logs, monthKey, mg) {
        if(!mg) return { hit:0, total:0 };
        const ms = monthStats(logs, monthKey);
        let hit = 0, total = 0;
        if((mg.gymSessions||0)>0) { total++; if(ms.gymSessions >= mg.gymSessions) hit++; }
        if((mg.runKm||0)>0)       { total++; if(ms.runKm       >= mg.runKm)       hit++; }
        if((mg.studyHours||0)>0)  { total++; if(ms.studyHours  >= mg.studyHours)  hit++; }
        if((mg.pagesRead||0)>0)   { total++; if(ms.pagesRead   >= mg.pagesRead)   hit++; }
        return { hit, total };
    }

    const emptyDay = () => ({ gym:false,running:false,greenTea:false,outsideFood:false,cheatMeal:false,weight:null,studyHours:0,workHours:0,pagesRead:0,readingBookId:null,screenTime:0,runKm:0,runSpeed:0 });
    const initData = () => ({
        dailyLogs:{}, books:[], currentBookId:null, monthlyNotes:{}, netWorthLogs:[],
        dailyGoalConfig: { gym:true, runKm:0, studyHours:3, pagesRead:20, custom:[] },
        weeklyGoals: {},
        monthlyGoals: {}
    });

    function mergeData(local, cloud) {
        const allDates = new Set([...Object.keys(local.dailyLogs||{}), ...Object.keys(cloud.dailyLogs||{})]);
        const dailyLogs = {};
        allDates.forEach(d => { dailyLogs[d] = {...(local.dailyLogs?.[d]||{}), ...(cloud.dailyLogs?.[d]||{})}; });
        // Merge weekly/monthly goals: union of keys, cloud wins per-key
        const weeklyGoals  = { ...(local.weeklyGoals||{}),  ...(cloud.weeklyGoals||{})  };
        const monthlyGoals = { ...(local.monthlyGoals||{}), ...(cloud.monthlyGoals||{}) };
        return {...local, ...cloud, dailyLogs, weeklyGoals, monthlyGoals};
    }

    // ── APP ───────────────────────────────────────────────────────────────────
    function App() {
        const [view, setView]             = useState('dashboard');
        const [goalsTab, setGoalsTab]     = useState('daily');
        const [fundTab,  setFundTab]      = useState('fitness');
        const [data, setData]             = useState(null);
        const [privacy, setPrivacy]       = useState(false);
        const [syncStatus, setSyncStatus] = useState('loading');
        const [showSetup, setShowSetup]   = useState(false);
        const [passInput, setPassInput]   = useState('');
        const [setupErr, setSetupErr]     = useState('');
        const [darkMode, setDarkMode]     = useState(() => localStorage.getItem('pp-dark') === '1');
        const [resetConfirm, setResetConfirm] = useState(false);
        const [menuOpen, setMenuOpen]         = useState(false);
        const userIdRef = useRef(localStorage.getItem('pp-sync-id') || '');
        const today = fmtDate(new Date());

        useEffect(() => {
            document.documentElement.classList.toggle('dark', darkMode);
            localStorage.setItem('pp-dark', darkMode ? '1' : '0');
        }, [darkMode]);

        useEffect(() => {
            window._setSyncStatus = setSyncStatus;
            return () => { window._setSyncStatus = null; };
        }, []);

        useEffect(() => {
            async function load() {
                let local;
                try { const s = localStorage.getItem('6mc-v2'); local = s ? JSON.parse(s) : initData(); }
                catch { local = initData(); }
                if (!local.netWorthLogs)    local.netWorthLogs    = [];
                if (!local.dailyGoalConfig) local.dailyGoalConfig = initData().dailyGoalConfig;
                if (!local.weeklyGoals)     local.weeklyGoals     = {};
                if (!local.monthlyGoals)    local.monthlyGoals    = {};
                const uid = localStorage.getItem('pp-sync-id');
                if (uid) {
                    userIdRef.current = uid;
                    setSyncStatus('syncing');
                    const cloud = await window._cloudLoad(uid);
                    if (cloud) {
                        const merged = mergeData(local, cloud);
                        if (!merged.netWorthLogs) merged.netWorthLogs = [];
                        localStorage.setItem('6mc-v2', JSON.stringify(merged));
                        setData(merged);
                    } else {
                        setData(local);
                        window._cloudSave(uid, local);
                    }
                    setSyncStatus('synced');
                } else {
                    setData(local);
                    setSyncStatus('idle');
                    setShowSetup(true);
                }
            }
            load();
        }, []);

        // Real-time sync listener
        useEffect(() => {
            if (!userIdRef.current || !data) return;

            const unsubscribe = _db.collection('users').doc(userIdRef.current).onSnapshot(
                doc => {
                    if (doc.exists && doc.metadata.hasPendingWrites === false) {
                        const cloud = doc.data();
                        setData(prev => {
                            const merged = mergeData(prev, cloud);
                            localStorage.setItem('6mc-v2', JSON.stringify(merged));
                            return merged;
                        });
                        setSyncStatus('synced');
                    }
                },
                () => setSyncStatus('offline')
            );

            return () => unsubscribe();
        }, [data ? data.dailyGoalConfig : null]);

        const doSetup = async () => {
            const id = passInput.trim().toLowerCase().replace(/\s+/g, '-');
            if (id.length < 4) { setSetupErr('Enter at least 4 characters'); return; }
            localStorage.setItem('pp-sync-id', id);
            userIdRef.current = id;
            setShowSetup(false);
            setSyncStatus('syncing');
            const cloud = await window._cloudLoad(id);
            const local = data || initData();
            const merged = cloud ? mergeData(local, cloud) : local;
            if (!merged.netWorthLogs) merged.netWorthLogs = [];
            localStorage.setItem('6mc-v2', JSON.stringify(merged));
            setData(merged);
            window._cloudSave(id, merged);
        };

        const doReset = async () => {
            const empty = initData();
            localStorage.setItem('6mc-v2', JSON.stringify(empty));
            if (userIdRef.current) window._cloudSave(userIdRef.current, empty);
            setData(empty);
            setShowSetup(false);
            setResetConfirm(false);
        };

        const exportData = () => {
            const dataStr = JSON.stringify(data, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `passion-project-backup-${today}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            setMenuOpen(false);
        };

        const importData = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = evt => {
                    try {
                        const imported = JSON.parse(evt.target.result);
                        const merged = mergeData(data, imported);
                        persist(merged);
                        alert('✅ Data imported and merged successfully!');
                    } catch (err) {
                        alert('❌ Error importing data: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
            setMenuOpen(false);
        };

        const persist = useCallback(nd => {
            setData(nd);
            localStorage.setItem('6mc-v2', JSON.stringify(nd));
            if (userIdRef.current) window._cloudSave(userIdRef.current, nd);
        }, []);

        const updateDay = useCallback((dateStr, updates) => {
            setData(prev => {
                const nd = { ...prev, dailyLogs: { ...prev.dailyLogs,
                    [dateStr]: { ...(prev.dailyLogs[dateStr]||emptyDay()), ...updates }
                }};
                localStorage.setItem('6mc-v2', JSON.stringify(nd));
                if (userIdRef.current) window._cloudSave(userIdRef.current, nd);
                return nd;
            });
        }, []);

        const updateReading = useCallback((dateStr, bookId, pagesRead) => {
            setData(prev => {
                const tl = prev.dailyLogs[dateStr]||emptyDay();
                const oldP = tl.pagesRead||0, oldB = tl.readingBookId;
                const bId = bookId ? Number(bookId) : null;
                const books = prev.books.map(b => {
                    if (b.id===oldB && b.id!==bId && oldP>0) return {...b,currentPage:Math.max(0,b.currentPage-oldP)};
                    if (b.id===bId) {
                        const delta = b.id===oldB ? pagesRead-oldP : pagesRead;
                        const np = Math.min(b.totalPages, Math.max(0, b.currentPage+delta));
                        return {...b,currentPage:np,finishedDate:np>=b.totalPages&&!b.finishedDate?fmtDate(new Date()):b.finishedDate};
                    }
                    return b;
                });
                const nd = {...prev, books, dailyLogs:{...prev.dailyLogs,[dateStr]:{...(prev.dailyLogs[dateStr]||emptyDay()),pagesRead,readingBookId:bId}}};
                localStorage.setItem('6mc-v2', JSON.stringify(nd));
                if (userIdRef.current) window._cloudSave(userIdRef.current, nd);
                return nd;
            });
        }, []);

        if (!data) return <div className="flex items-center justify-center h-screen text-slate-400">Loading…</div>;

        if (showSetup) return (
            <div className="min-h-screen bg-slate-50 flex items-center justify-center px-6">
                <div className="bg-white rounded-3xl shadow-lg p-8 max-w-sm w-full">
                    {userIdRef.current ? (
                        resetConfirm ? (<>
                            <div className="text-4xl text-center mb-4">⚠️</div>
                            <h2 className="text-xl font-bold text-slate-800 text-center mb-2">Reset everything?</h2>
                            <p className="text-sm text-slate-500 text-center mb-6">This will permanently delete <strong>all your logs, books, weight entries and net worth history</strong> on all devices. This cannot be undone.</p>
                            <button onClick={doReset} className="w-full bg-red-500 text-white rounded-xl py-3 font-semibold text-sm hover:bg-red-600 transition mb-3">Yes, delete everything</button>
                            <button onClick={()=>setResetConfirm(false)} className="w-full text-slate-400 text-sm py-2 hover:text-slate-600 transition">Cancel</button>
                        </>) : (<>
                            <div className="text-4xl text-center mb-4">⚙️</div>
                            <h2 className="text-xl font-bold text-slate-800 text-center mb-2">Settings</h2>
                            <p className="text-sm text-slate-500 text-center mb-6">Syncing as <strong className="text-slate-700">{userIdRef.current}</strong></p>
                            <button onClick={()=>setResetConfirm(true)} className="w-full bg-red-50 text-red-600 border border-red-200 rounded-xl py-3 font-semibold text-sm hover:bg-red-100 transition mb-3">🗑 Reset all data</button>
                            <button onClick={()=>{setShowSetup(false);setResetConfirm(false);}} className="w-full text-slate-400 text-sm py-2 hover:text-slate-600 transition">Close</button>
                        </>)
                    ) : (<>
                        <div className="text-4xl text-center mb-4">☁️</div>
                        <h2 className="text-xl font-bold text-slate-800 text-center mb-2">Set up cloud sync</h2>
                        <p className="text-sm text-slate-500 text-center mb-6">Enter a passphrase to sync your data across your phone and laptop. Use the <strong>same passphrase</strong> on all devices.</p>
                        <input
                            className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-400 mb-3"
                            placeholder="e.g. veer-passion-2026"
                            value={passInput} onChange={e=>setPassInput(e.target.value)}
                            onKeyDown={e=>e.key==='Enter'&&doSetup()}
                            autoCapitalize="none" autoCorrect="off"
                        />
                        {setupErr && <p className="text-xs text-red-500 mb-3">{setupErr}</p>}
                        <button onClick={doSetup} className="w-full bg-blue-600 text-white rounded-xl py-3 font-semibold text-sm hover:bg-blue-700 transition mb-3">Start Syncing</button>
                        <button onClick={()=>setShowSetup(false)} className="w-full text-slate-400 text-sm py-2 hover:text-slate-600 transition">Skip for now</button>
                    </>)}
                </div>
            </div>
        );

        const challDay = Math.max(0, Math.min(daysBetween(CHALLENGE_START, today)+1, TOTAL_DAYS));

        const TABS = [
            { id:'dashboard',    label:'Dashboard' },
            { id:'goals',        label:'Goals' },
            { id:'fundamentals', label:'Fundamentals' },
        ];

        const navigate = (main, sub) => {
            setView(main);
            setMenuOpen(false);
            if(sub && main==='goals')        setGoalsTab(sub);
            if(sub && main==='fundamentals') setFundTab(sub);
        };

        return (
            <div className="min-h-screen bg-slate-50">
                {menuOpen && <div className="fixed inset-0 z-30" onClick={()=>setMenuOpen(false)}/>}
                <div className="bg-white border-b border-slate-200 sticky top-0 z-40" style={{paddingTop:'env(safe-area-inset-top)'}}>
                    <div className="max-w-7xl mx-auto px-4 pt-4 pb-1 flex items-center justify-between relative">
                        <div>
                            <h1 className="text-lg font-bold text-slate-800">Passion Project</h1>
                            <p className="text-xs text-slate-400 mt-0.5">{today < CHALLENGE_START ? '🚀 Starts tomorrow — Feb 26' : `Day ${challDay} of ${TOTAL_DAYS}`} · {new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})}</p>
                        </div>
                        <button onClick={()=>setMenuOpen(o=>!o)} className="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 hover:bg-slate-200 transition">
                            <span className="text-lg font-medium text-slate-700">:)</span>
                        </button>
                        {menuOpen && (
                            <div className="absolute right-4 top-full mt-1 w-64 bg-white rounded-2xl shadow-xl border border-slate-100 z-50 overflow-hidden">
                                {/* Sync status */}
                                <button onClick={()=>{setMenuOpen(false);setResetConfirm(false);setShowSetup(true);}} className="w-full flex items-center justify-between px-5 py-4 hover:bg-slate-50 transition border-b border-slate-100">
                                    <span className="text-sm font-medium text-slate-700">Cloud sync</span>
                                    <span className="text-sm text-slate-500">
                                        {syncStatus==='synced'  ? '☁️ Synced'   : ''}
                                        {syncStatus==='syncing' ? '🔄 Syncing…' : ''}
                                        {syncStatus==='offline' ? '⚡ Offline'  : ''}
                                        {syncStatus==='idle'    ? '⚙️ Set up'   : ''}

                                </button>

                                <button onClick={()=>setDarkMode(d=>!d)} className="w-full flex items-center justify-between px-5 py-4 hover:bg-slate-50 transition border-b border-slate-100">
                                    <span className="text-sm font-medium text-slate-700">Dark mode</span>
                                    <span className="text-sm">{darkMode ? '☀️ On' : '🌙 Off'}</span>
                                </button>
                                {/* Privacy */}
                                <button onClick={()=>setPrivacy(p=>!p)} className="w-full flex items-center justify-between px-5 py-4 hover:bg-slate-50 transition border-b border-slate-100">
                                    <span className="text-sm font-medium text-slate-700">Hide numbers</span>
                                    <span className="text-sm">{privacy ? '🙈 On' : '👁 Off'}</span>
                                </button>
                                {/* Export */}
                                <button onClick={exportData} className="w-full flex items-center justify-between px-5 py-4 hover:bg-slate-50 transition border-b border-slate-100">
                                    <span className="text-sm font-medium text-slate-700">Export backup</span>
                                    <span className="text-sm">📥</span>
                                </button>
                                {/* Import */}
                                <button onClick={importData} className="w-full flex items-center justify-between px-5 py-4 hover:bg-slate-50 transition border-b border-slate-100">
                                    <span className="text-sm font-medium text-slate-700">Import & merge</span>
                                    <span className="text-sm">📤</span>
                                </button>
                                {/* Reset */}
                                <button onClick={()=>{setMenuOpen(false);setResetConfirm(false);setShowSetup(true);}} className="w-full flex items-center px-5 py-4 hover:bg-red-50 transition">
                                    <span className="text-sm font-medium text-red-500">🗑 Reset all data</span>
                                </button>
                            </div>
                        )}
                    </div>
                    <div className="max-w-7xl mx-auto px-4 flex gap-0 overflow-x-auto">
                        {TABS.map(t=>(
                            <button key={t.id} onClick={()=>navigate(t.id)}
                                className={`px-5 py-3.5 text-sm font-semibold whitespace-nowrap border-b-2 transition-colors ${view===t.id?'border-blue-600 text-blue-600':'border-transparent text-slate-500 hover:text-slate-700'}`}>
                                {t.label}

                <div className="max-w-7xl mx-auto px-4 py-5 pb-24">

                    {view==='goals' && (<>
                        {/* Goals sub-nav */}
                        <div className="flex gap-2 mb-5">
                            {[['daily','📝 Daily'],['weekly','📅 Weekly'],['monthly','🗓 Monthly']].map(([id,lbl])=>(
                                <button key={id} onClick={()=>setGoalsTab(id)}
                                    className={`px-4 py-2 rounded-full text-sm font-medium transition-colors ${goalsTab===id?'bg-blue-600 text-white':'bg-white border border-slate-200 text-slate-600 hover:border-blue-400'}`}>
                                    {lbl}
                                </button>

                        {goalsTab==='weekly'  && <WeeklyView  data={data} today={today} save={persist} />}
                        {goalsTab==='monthly' && <MonthlyView data={data} today={today} save={persist} />}
                    </>)}

                        {/* Fundamentals sub-nav */}
                        <div className="flex gap-2 mb-5 overflow-x-auto pb-1">
                            {[['isb','🎓 ISB'],['fitness','🏋️ Fitness'],['reading','📖 Reading'],['work','💼 Work'],['wealth','💰 Wealth']].map(([id,lbl])=>(
                                <button key={id} onClick={()=>setFundTab(id)}
                                    className={`px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-colors ${fundTab===id?'bg-blue-600 text-white':'bg-white border border-slate-200 text-slate-600 hover:border-blue-400'}`}>
                                    {lbl}

                        {fundTab==='reading' && <ReadingView data={data} save={persist} today={today} />}
                        {fundTab==='work'    && <WorkView    data={data} save={persist} today={today} />}

    // ── DASHBOARD ─────────────────────────────────────────────────────────────
    function Dashboard({ data, today, challDay, privacy, navigate }) {
        const logs = data.dailyLogs;
        const ws   = getWeekStart(today);
        const wDates = useMemo(() => getWeekDates(ws), [ws]);
        const monthKey = today.slice(0,7);

        // ISB - Memoized calculations
        const streak = useMemo(() => {
            let s = 0;
            const cd = new Date(parseD(today));
            for (let i = 0; i < 200; i++) {
                const ds = fmtDate(cd);
                const h = parseFloat(logs[ds]?.studyHours) || 0;
                if (h >= (isWeekend(ds) ? 5 : 3)) {
                    s++;
                    cd.setDate(cd.getDate() - 1);
                } else break;
            }
            return s;
        }, [logs, today]);

        const studyDays = useMemo(() =>
            Object.keys(logs).filter(d => d >= CHALLENGE_START).filter(d => {
                const h = parseFloat(logs[d]?.studyHours) || 0;
                return isWeekend(d) ? h >= 5 : h >= 3;
            }).length,
        [logs]);

        // Fitness - Memoized calculations
        const latestW = useMemo(() => {
            const wEntries = Object.entries(logs).filter(([_, l]) => l.weight).sort(([a], [b]) => a < b ? -1 : 1);
            return wEntries.length ? wEntries[wEntries.length - 1][1].weight : null;
        }, [logs]);

        const daysToJuly = Math.max(0, daysBetween(today, '2026-07-01'));
        const daysToHyrox = Math.max(0, daysBetween(today, HYROX_DATE));

        // Work - Memoized
        const workWk = useMemo(() =>
            wDates.reduce((s, d) => s + (parseFloat(logs[d]?.workHours) || 0), 0),
        [wDates, logs]);

        // Reading - Memoized calculations
        const curBook = useMemo(() =>
            data.books.find(b => b.id === data.currentBookId),
        [data.books, data.currentBookId]);

        const totalPages = useMemo(() =>
            Object.values(logs).reduce((s, l) => s + (l.pagesRead || 0), 0),
        [logs]);

        const booksFinished = useMemo(() =>
            data.books.filter(b => b.finishedDate).length,
        [data.books]);

        // Wealth - Memoized calculations
        const nw = useMemo(() => {
            const nwLogs = [...(data.netWorthLogs || [])].sort((a, b) => a.date < b.date ? -1 : 1);
            const latestNW = nwLogs.length ? nwLogs[nwLogs.length - 1] : null;
            return latestNW ? calcNW(latestNW) : null;
        }, [data.netWorthLogs]);

        // Goals summary - Memoized
        const { todayHit, todayTotal, wkHit, wkTotal, mHit, mTotal } = useMemo(() => {
            const tl = logs[today] || emptyDay();
            const cfg = data.dailyGoalConfig || initData().dailyGoalConfig;
            const { hit: todayHit, total: todayTotal } = dailyGoalsHit(tl, cfg, today);

            const wg = data.weeklyGoals?.[ws];
            const { hit: wkHit, total: wkTotal } = weekGoalsHit(logs, ws, wg);

            const mg = data.monthlyGoals?.[monthKey];
            const { hit: mHit, total: mTotal } = monthGoalsHit(logs, monthKey, mg);

            return { todayHit, todayTotal, wkHit, wkTotal, mHit, mTotal };
        }, [logs, today, ws, monthKey, data.dailyGoalConfig, data.weeklyGoals, data.monthlyGoals]);

        const pct = Math.min(100, ((challDay / TOTAL_DAYS) * 100)).toFixed(0);

        return (
            <div className="space-y-5">
                {/* Progress bar */}
                <div className="bg-white rounded-2xl p-5 border border-slate-100">
                    <div className="flex justify-between items-end mb-3">
                        <div><p className="font-bold text-slate-800 text-lg">Passion Project</p><p className="text-xs text-slate-400">Feb 26 – Aug 31, 2026</p></div>
                        <div className="text-right"><span className="text-3xl font-bold text-blue-600">{pct}%</span><p className="text-xs text-slate-400">Day {challDay}/{TOTAL_DAYS}</p></div>
                    </div>
                    <div className="bg-slate-100 rounded-full h-3"><div className="bg-blue-600 rounded-full h-3 transition-all" style={{width:`${pct}%`}}/></div>
                    {/* Period summary pills */}
                    <div className="flex gap-2 mt-4 flex-wrap">
                        <button onClick={()=>navigate('goals','daily')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold border transition-colors ${todayHit===todayTotal&&todayTotal>0?'bg-emerald-50 border-emerald-200 text-emerald-700':'bg-slate-50 border-slate-200 text-slate-600 hover:border-blue-300'}`}>
                            📝 Today {todayTotal>0?`${todayHit}/${todayTotal}`:'→ set goals'}
                        </button>
                        <button onClick={()=>navigate('goals','weekly')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold border transition-colors ${wkTotal>0&&wkHit===wkTotal?'bg-emerald-50 border-emerald-200 text-emerald-700':'bg-slate-50 border-slate-200 text-slate-600 hover:border-blue-300'}`}>
                            📅 This week {wkTotal>0?`${wkHit}/${wkTotal}`:'→ set targets'}
                        </button>
                        <button onClick={()=>navigate('goals','monthly')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold border transition-colors ${mTotal>0&&mHit===mTotal?'bg-emerald-50 border-emerald-200 text-emerald-700':'bg-slate-50 border-slate-200 text-slate-600 hover:border-blue-300'}`}>
                            🗓 This month {mTotal>0?`${mHit}/${mTotal}`:'→ set targets'}
                        </button>
                    </div>
                </div>

                {/* 5 Life Goal cards */}
                <p className="text-xs font-semibold text-slate-400 uppercase tracking-widest">Life Goals</p>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">

                    {/* ISB */}
                    <ClickCard dotColor="#6b7fd7" onClick={()=>navigate('fundamentals','isb')}>
                        <div className="text-2xl">🎓</div>
                        <div className="font-bold text-sm mt-1">ISB 2026</div>
                        <div className="text-3xl font-bold mt-1">{streak>0?streak:studyDays}</div>
                        <div className="text-xs opacity-75">{streak>0?'day streak 🔥':'study days ✓'}</div>
                        <MiniBar pct={(studyDays/TOTAL_DAYS)*100}/>
                        <div className="text-xs opacity-50 mt-1">Tap for details →</div>
                    </ClickCard>

                    {/* Fitness */}
                    <ClickCard dotColor="#6bbf8d" onClick={()=>navigate('fundamentals','fitness')}>
                        <div className="text-2xl">⚖️</div>
                        <div className="font-bold text-sm mt-1">Fitness</div>
                        {latestW ? (<>
                            <div className="text-3xl font-bold mt-1">{latestW}<span className="text-base font-normal"> kg</span></div>
                            {daysToHyrox > 0
                                ? <div className="text-xs opacity-75">🏁 Hyrox in {daysToHyrox}d · need ≤{HYROX_WEIGHT} kg</div>
                                : <div className="text-xs opacity-75">→ 78 kg by July · {daysToJuly}d to go</div>
                            }
                        </>) : (<>
                            <div className="text-lg font-semibold mt-2 opacity-80">Log weight</div>
                            <div className="text-xs opacity-60">🏁 Hyrox Apr 12 · need ≤{HYROX_WEIGHT} kg</div>
                        </>)}
                        <div className="text-xs opacity-50 mt-1">Tap for details →</div>
                    </ClickCard>

                    {/* Work */}
                    <ClickCard dotColor="#a78bce" onClick={()=>navigate('fundamentals','work')}>
                        <div className="text-2xl">💼</div>
                        <div className="font-bold text-sm mt-1">Work First</div>
                        <div className="text-3xl font-bold mt-1">{workWk.toFixed(1)}<span className="text-base font-normal">h</span></div>
                        <div className="text-xs opacity-75">focused this week</div>
                        <div className="text-xs opacity-50 mt-1">Tap for details →</div>
                    </ClickCard>

                    {/* Reading */}
                    <ClickCard dotColor="#d4a574" onClick={()=>navigate('fundamentals','reading')}>
                        <div className="text-2xl">📖</div>
                        <div className="font-bold text-sm mt-1">Reading</div>
                        {curBook ? (<>
                            <div className="font-semibold text-sm mt-1 leading-tight truncate">{curBook.title}</div>
                            <div className="text-xs opacity-75">p.{curBook.currentPage}/{curBook.totalPages}</div>
                            <MiniBar pct={(curBook.currentPage/curBook.totalPages)*100}/>
                        </>) : (<>
                            <div className="text-3xl font-bold mt-1">{totalPages}</div>
                            <div className="text-xs opacity-75">pages · {booksFinished} books done</div>
                        </>)}
                        <div className="text-xs opacity-50 mt-1">Tap for details →</div>
                    </ClickCard>

                    {/* Wealth */}
                    <ClickCard dotColor="#7cb89d" onClick={()=>navigate('fundamentals','wealth')}>
                        <div className="text-2xl">💰</div>
                        <div className="font-bold text-sm mt-1">₹6L Net Worth</div>
                        {nw!==null ? (<>
                            <div className="text-2xl font-bold mt-1">{fmtMoney(nw,privacy)}</div>
                            <div className="text-xs opacity-75">{((nw/NW_GOAL)*100).toFixed(0)}% of goal</div>
                            <MiniBar pct={(nw/NW_GOAL)*100}/>
                        </>) : (<>
                            <div className="text-sm font-semibold mt-2 opacity-80">Log first entry</div>
                            <div className="text-xs opacity-60">bimonthly tracking</div>
                        </>)}
                        <div className="text-xs opacity-50 mt-1">Tap for details →</div>
                    </ClickCard>
                </div>

                {/* Streak + Quote */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {streak > 0 ? (
                        <div className="bg-orange-50 border border-orange-200 rounded-2xl p-5 flex items-center gap-4">
                            <span className="text-5xl">🔥</span>
                            <div>
                                <p className="text-3xl font-bold text-orange-700">{streak}</p>
                                <p className="font-semibold text-orange-700">Day Study Streak</p>
                                <p className="text-xs text-orange-400 mt-0.5">Keep it alive — log today.</p>
                            </div>
                        </div>
                    ) : (
                        <div className="bg-blue-50 border border-blue-200 rounded-2xl p-5 flex items-center gap-4">
                            <span className="text-5xl">🎯</span>
                            <div>
                                <p className="font-semibold text-blue-700">Start your streak</p>
                                <p className="text-sm text-blue-500 mt-1">Log {isWeekend(today)?'5':'3'}h of study today to get the fire going.</p>
                            </div>
                        </div>
                    )}
                    <div className="bg-slate-800 text-white rounded-2xl p-5 flex flex-col justify-center">
                        <p className="text-sm italic opacity-90 leading-relaxed">"We are what we repeatedly do. Excellence, then, is not an act but a habit."</p>
                        <p className="text-xs opacity-40 mt-3">— Aristotle</p>
                    </div>
                </div>
            </div>
        );
    }

    function ClickCard({ dotColor, onClick, children }) {
        return (
            <div onClick={onClick} className="relative bg-white rounded-2xl p-5 cursor-pointer hover:shadow-lg transition-all active:scale-95 border border-slate-200">
                <div className="color-dot" style={{backgroundColor: dotColor}}></div>
                <div className="text-slate-800">
                    {children}
                </div>
            </div>
        );
    }

    // ── DAILY VIEW ────────────────────────────────────────────────────────────
    function DailyView({ data, today, challDay, updateDay, updateReading, save }) {
        const log = data.dailyLogs[today]||emptyDay();
        const cfg = data.dailyGoalConfig || initData().dailyGoalConfig;
        const [studyInput, setStudyInput] = useState(log.studyHours||'');
        const [workInput,  setWorkInput]  = useState(log.workHours ||'');
        const [wInput,     setWInput]     = useState(log.weight    ||'');
        const [pagesInput,  setPagesInput]  = useState(log.pagesRead  ||'');
        const [readBookId,  setReadBookId]  = useState(String(log.readingBookId||''));
        const [screenInput, setScreenInput] = useState(log.screenTime ||'');
        const [runKmInput,  setRunKmInput]  = useState(log.runKm      ||'');
        const [runSpeedInput, setRunSpeedInput] = useState(log.runSpeed||'');
        const [editGoals, setEditGoals]    = useState(false);
        const [cfgDraft,  setCfgDraft]     = useState(null);
        const activeBooks = data.books.filter(b=>!b.finishedDate);
        const pagesInputRef = useRef(null);

        useEffect(() => {
            setStudyInput(log.studyHours ||'');
            setWorkInput(log.workHours   ||'');
            setWInput(log.weight         ||'');
            setPagesInput(log.pagesRead  ||'');
            setReadBookId(String(log.readingBookId||''));
            setScreenInput(log.screenTime||'');
            setRunKmInput(log.runKm      ||'');
            setRunSpeedInput(log.runSpeed||'');
        }, [today]);

        useEffect(() => {
            if (!readBookId && data.currentBookId) setReadBookId(String(data.currentBookId));
        }, [data.currentBookId]);

        const toggle = f => updateDay(today, {[f]:!log[f]});
        const studyT = isWeekend(today)?5:3;
        const studyH = parseFloat(log.studyHours)||0;
        const workH  = parseFloat(log.workHours) ||0;

        const saveReading = () => {
            const p = parseInt(pagesInput);
            if (!readBookId || isNaN(p) || p<=0) return;
            updateReading(today, Number(readBookId), p);
            setPagesInput('');
            if (pagesInputRef.current) {
                pagesInputRef.current.blur();
            }
        };

        const readBook   = log.readingBookId ? data.books.find(b=>b.id===log.readingBookId) : null;
        const screenT    = isWeekend(today) ? 4 : 3;
        const screenH    = parseFloat(log.screenTime)||0;
        const screenGood = screenH > 0 && screenH <= screenT;
        const goalsHit   = [(log.gym||log.running), studyH>=studyT, workH>0, (log.pagesRead||0)>0, log.weight!==null, screenGood].filter(Boolean).length;

        const { hit: goalHit, total: goalTotal } = dailyGoalsHit(log, cfg, today);

        const saveCfg = () => {
            if(!cfgDraft) return;
            save({ ...data, dailyGoalConfig: cfgDraft });
            setEditGoals(false);
            setCfgDraft(null);
        };
        const openEdit = () => { setCfgDraft({...cfg, custom:[...(cfg.custom||[]).map(g=>({...g}))]  }); setEditGoals(true); };

        return (
            <div className="space-y-5">
                <div className="text-center pb-1">
                    <h2 className="text-2xl font-bold text-slate-800">{parseD(today).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</h2>
                    <p className="text-sm text-slate-400 mt-1">{challDay > 0 ? `Day ${challDay}` : '🚀 Challenge starts tomorrow'} · {isWeekend(today)?'Weekend — 5h study goal':'Weekday — 3h study goal'}</p>
                </div>

                {/* Goals Scorecard */}
                <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
                    <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100">
                        <div className="flex items-center gap-3">
                            <span className={`text-lg font-bold ${goalHit===goalTotal&&goalTotal>0?'text-emerald-600':goalHit>=goalTotal/2?'text-amber-600':'text-slate-500'}`}>{goalHit}/{goalTotal}</span>
                            <span className="text-sm text-slate-500">goals today</span>
                        </div>
                        <button onClick={openEdit} className="text-xs text-blue-500 hover:text-blue-700 font-medium">Edit targets</button>
                    </div>
                    <div className="divide-y divide-slate-50">
                        {/* Gym/Run */}
                        <div className="flex items-center justify-between px-5 py-3">
                            <div className="flex items-center gap-2"><span className="text-base">🏋️🏃</span><span className="text-sm text-slate-700">Gym/Run</span></div>
                            <span className={`text-sm font-semibold ${(log.gym||log.running)?'text-emerald-600':'text-slate-300'}`}>{(log.gym||log.running)?'✓':'–'}</span>
                        </div>
                        {(cfg.runKm||0)>0 && <div className="flex items-center justify-between px-5 py-3">
                            <div className="flex items-center gap-2"><span className="text-base">🏃</span><span className="text-sm text-slate-700">Run {cfg.runKm} km</span></div>
                            <span className={`text-sm font-semibold ${(parseFloat(log.runKm)||0)>=cfg.runKm?'text-emerald-600':'text-slate-400'}`}>
                                {(parseFloat(log.runKm)||0)>0?`${log.runKm} km`:'–'}
                            </span>
                        </div>}
                        <div className="flex items-center justify-between px-5 py-3">
                            <div className="flex items-center gap-2"><span className="text-base">📚</span><span className="text-sm text-slate-700">Study {cfg.studyHours||studyT}h</span></div>
                            <span className={`text-sm font-semibold ${studyH>=(cfg.studyHours||studyT)?'text-emerald-600':studyH>0?'text-amber-600':'text-slate-300'}`}>
                                {studyH>0?`${studyH}h`:'–'}
                            </span>
                        </div>
                        {(cfg.pagesRead||0)>0 && <div className="flex items-center justify-between px-5 py-3">
                            <div className="flex items-center gap-2"><span className="text-base">📖</span><span className="text-sm text-slate-700">Read {cfg.pagesRead} pages</span></div>
                            <span className={`text-sm font-semibold ${(parseInt(log.pagesRead)||0)>=cfg.pagesRead?'text-emerald-600':(parseInt(log.pagesRead)||0)>0?'text-amber-600':'text-slate-300'}`}>
                                {(parseInt(log.pagesRead)||0)>0?`${log.pagesRead} pg`:'–'}
                            </span>
                        </div>}
                        {(cfg.custom||[]).map(g=>(
                            <div key={g.id} className="flex items-center justify-between px-5 py-3">
                                <div className="flex items-center gap-2"><span className="text-base">⭐</span><span className="text-sm text-slate-700">{g.label}{g.type==='number'?` (${g.target})`:''}</span></div>
                                <span className={`text-sm font-semibold ${(g.type==='boolean'?log[`cg_${g.id}`]:(parseFloat(log[`cg_${g.id}`])||0)>=(g.target||1))?'text-emerald-600':'text-slate-300'}`}>
                                    {g.type==='boolean'?(log[`cg_${g.id}`]?'✓':'–'):(parseFloat(log[`cg_${g.id}`])||0)>0?log[`cg_${g.id}`]:'–'}
                                </span>
                            </div>
                        ))}
                    </div>
                </div>

                {/* Edit Goals Modal */}
                {editGoals && cfgDraft && (

                            <div><label className="text-xs text-slate-500 mb-1 block">Run goal (km)</label>
                                <input type="number" step="0.5" min="0" value={cfgDraft.runKm||''} onChange={e=>setCfgDraft(d=>({...d,runKm:parseFloat(e.target.value)||0}))}

                            <div><label className="text-xs text-slate-500 mb-1 block">Study goal (h)</label>
                                <input type="number" step="0.5" min="0" value={cfgDraft.studyHours||''} onChange={e=>setCfgDraft(d=>({...d,studyHours:parseFloat(e.target.value)||0}))}

                            <div><label className="text-xs text-slate-500 mb-1 block">Reading goal (pages)</label>
                                <input type="number" step="1" min="0" value={cfgDraft.pagesRead||''} onChange={e=>setCfgDraft(d=>({...d,pagesRead:parseInt(e.target.value)||0}))}
                                    placeholder="0 = skip" className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400"/></div>
                        </div>
                        {(cfgDraft.custom||[]).map((g,i)=>(
                            <div key={g.id} className="flex gap-2 items-center">
                                <input type="text" value={g.label} onChange={e=>setCfgDraft(d=>({...d,custom:d.custom.map((x,j)=>j===i?{...x,label:e.target.value}:x)}))}
                                    placeholder="Goal label" className="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none"/>
                                <select value={g.type} onChange={e=>setCfgDraft(d=>({...d,custom:d.custom.map((x,j)=>j===i?{...x,type:e.target.value}:x)}))}
                                    className="border border-slate-200 rounded-xl px-2 py-2 text-sm focus:outline-none">
                                    <option value="boolean">Check</option><option value="number">Number</option>
                                </select>
                                {g.type==='number'&&<input type="number" min="1" value={g.target||1} onChange={e=>setCfgDraft(d=>({...d,custom:d.custom.map((x,j)=>j===i?{...x,target:parseFloat(e.target.value)||1}:x)}))}
                                    className="w-16 border border-slate-200 rounded-xl px-2 py-2 text-sm focus:outline-none"/>}
                                <button onClick={()=>setCfgDraft(d=>({...d,custom:d.custom.filter((_,j)=>j!==i)}))} className="text-red-400 hover:text-red-600 text-lg px-1">×</button>
                            </div>
                        ))}
                        <button onClick={()=>setCfgDraft(d=>({...d,custom:[...(d.custom||[]),{id:Date.now(),label:'',type:'boolean',target:1}]}))}
                            className="text-sm text-blue-500 hover:text-blue-700">+ Add custom goal</button>
                        <div className="flex gap-2 pt-2">
                            <button onClick={saveCfg} className="flex-1 bg-blue-600 text-white rounded-xl py-2.5 text-sm font-semibold hover:bg-blue-700 transition">Save</button>
                            <button onClick={()=>{setEditGoals(false);setCfgDraft(null);}} className="flex-1 border border-slate-200 text-slate-600 rounded-xl py-2.5 text-sm hover:bg-slate-50 transition">Cancel</button>
                        </div>
                    </div>
                )}

                <p className="text-xs font-semibold text-slate-400 uppercase tracking-widest pt-1">Log Your Day</p>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                    {/* LEFT col */}
                    <div className="space-y-5">
                        {/* Health habits */}
                        <Section title="🏃 Health Habits" accent="border-l-emerald-500">
                            <Toggle checked={log.gym}      onChange={()=>toggle('gym')}      label="Gym"         sub="Strength session" />
                            <Toggle checked={log.running}  onChange={()=>toggle('running')}  label="Running"     sub="Outdoor / cardio" />
                            {log.running && (
                                <div className="ml-1 pl-3 border-l-2 border-sky-300 space-y-2">
                                    <div className="flex gap-2 items-center">
                                        <input type="number" step="0.1" min="0" max="100" value={runKmInput} onChange={e=>setRunKmInput(e.target.value)}
                                            placeholder="0.0" className="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-400"/>
                                        <span className="text-sm text-slate-400 w-6">km</span>
                                    </div>
                                    <div className="flex gap-2 items-center">
                                        <input type="number" step="0.1" min="0" max="30" value={runSpeedInput} onChange={e=>setRunSpeedInput(e.target.value)}
                                            placeholder="e.g. 6.5" className="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-400"/>
                                        <span className="text-sm text-slate-400 w-14">min/km</span>
                                    </div>
                                    <button onClick={()=>{const km=parseFloat(runKmInput),sp=parseFloat(runSpeedInput);if(!isNaN(km)&&km>0)updateDay(today,{runKm:km,runSpeed:isNaN(sp)?0:sp});}}
                                        className="w-full py-2 bg-sky-500 text-white text-sm rounded-xl font-medium hover:bg-sky-600 transition">Save run</button>
                                    {(log.runKm>0) && <p className="text-xs text-sky-600">{log.runKm} km logged{log.runSpeed>0?` · ${fmtPace(log.runSpeed)}`:''}</p>}
                                </div>
                            )}
                            <Toggle checked={log.greenTea} onChange={()=>toggle('greenTea')} label="Green Tea"   sub="Had green tea today" />
                            <div className="grid grid-cols-2 gap-2 pt-1">
                                <Toggle checked={!log.outsideFood} onChange={()=>toggle('outsideFood')} label="No outside food" sub="Home food only" />
                                <Toggle checked={log.cheatMeal}    onChange={()=>toggle('cheatMeal')}   label="Cheat meal"     sub="1 per week ok" warn />
                            </div>
                            {/* Screen time */}
                            <div className="pt-3 border-t border-slate-100 mt-1">
                                <div className="flex justify-between items-center mb-2">
                                    <label className="text-sm font-medium text-slate-700">📱 Screen time</label>
                                    <span className={`text-xs font-medium px-2 py-0.5 rounded-lg ${screenGood?'bg-emerald-100 text-emerald-700':screenH>screenT?'bg-red-100 text-red-600':'bg-slate-100 text-slate-500'}`}>
                                        Goal: under {screenT}h
                                    </span>
                                </div>
                                <div className="flex gap-2 items-center">
                                    <input type="number" step="0.5" min="0" max="24" value={screenInput} onChange={e=>setScreenInput(e.target.value)}
                                        placeholder="0"
                                        className={`flex-1 border rounded-xl px-3 py-2.5 text-sm focus:outline-none ${screenH>screenT?'border-red-300 focus:border-red-400':'border-slate-200 focus:border-slate-400'}`}/>
                                    <span className="text-sm text-slate-400">hrs</span>
                                    <button onClick={()=>{const h=parseFloat(screenInput);if(!isNaN(h))updateDay(today,{screenTime:h});}}
                                        className="px-4 py-2.5 bg-slate-700 text-white text-sm rounded-xl font-medium hover:bg-slate-800 transition">Save</button>
                                </div>
                                {screenH > 0 && (
                                    <p className={`text-xs mt-1.5 ${screenGood?'text-emerald-600':'text-red-500'}`}>
                                        {screenGood ? `✓ ${screenH}h — under ${screenT}h goal` : `⚠ ${screenH}h — over by ${(screenH-screenT).toFixed(1)}h`}
                                    </p>
                                )}
