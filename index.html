                        </Section>

                        {/* Weight */}
                        <Section title="⚖️ Weight" accent="border-l-emerald-500">
                            <div className="flex gap-2 items-center">
                                <input type="number" step="0.1" min="40" max="200" value={wInput} onChange={e=>setWInput(e.target.value)}
                                    placeholder={log.weight?String(log.weight):'e.g. 84.5'}
                                    className="flex-1 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500"/>
                                <span className="text-sm text-slate-400">kg</span>
                                <button onClick={()=>{const w=parseFloat(wInput);if(!isNaN(w))updateDay(today,{weight:w});}}
                                    className="px-4 py-2.5 bg-emerald-600 text-white text-sm rounded-xl font-medium hover:bg-emerald-700 transition">Save</button>
                            </div>
                            {log.weight && <p className="text-xs text-emerald-600 mt-1">✓ {log.weight} kg logged</p>}
                        </Section>
                    </div>

                    {/* RIGHT col */}
                    <div className="space-y-5">
                        {/* Study */}
                        <Section title="🎓 Study — ISB Prep" accent="border-l-blue-500">
                            <div className="flex justify-between items-center mb-2">
                                <span className="text-sm font-medium text-slate-700">Hours studied today</span>
                                <span className="text-xs text-slate-400">Goal: {studyT}h</span>
                            </div>
                            <div className="flex gap-2 items-center">
                                <input type="number" step="0.5" min="0" max="16" value={studyInput} onChange={e=>setStudyInput(e.target.value)}
                                    placeholder="0"
                                    className="flex-1 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-blue-500"/>
                                <span className="text-sm text-slate-400">hrs</span>
                                <button onClick={()=>{const h=parseFloat(studyInput);if(!isNaN(h))updateDay(today,{studyHours:h});}}
                                    className="px-4 py-2.5 bg-blue-600 text-white text-sm rounded-xl font-medium hover:bg-blue-700 transition">Save</button>
                            </div>
                            {studyH>0 && <p className={`text-xs mt-1 ${studyH>=studyT?'text-emerald-600':'text-amber-600'}`}>{studyH>=studyT?`✓ Goal met! ${studyH}h`:`${studyH}h — ${(studyT-studyH).toFixed(1)}h to go`}</p>}
                        </Section>

                        {/* Work */}
                        <Section title="💼 Focused Work" accent="border-l-violet-500">
                            <div className="flex gap-2 items-center">
                                <input type="number" step="0.5" min="0" max="16" value={workInput} onChange={e=>setWorkInput(e.target.value)}
                                    placeholder="0"
                                    className="flex-1 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-violet-500"/>
                                <span className="text-sm text-slate-400">hrs</span>
                                <button onClick={()=>{const h=parseFloat(workInput);if(!isNaN(h))updateDay(today,{workHours:h});}}
                                    className="px-4 py-2.5 bg-violet-600 text-white text-sm rounded-xl font-medium hover:bg-violet-700 transition">Save</button>
                            </div>
                            {workH>0 && <p className="text-xs text-violet-600 mt-1">✓ {workH}h focused work logged</p>}
                        </Section>

                        {/* Reading */}
                        <Section title="📖 Reading" accent="border-l-amber-500">
                            {activeBooks.length>0 ? (
                                <div className="space-y-2">
                                    <select value={readBookId} onChange={e=>setReadBookId(e.target.value)}
                                        className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-amber-500 bg-white">
                                        <option value="">Select book…</option>
                                        {activeBooks.map(b=><option key={b.id} value={b.id}>{b.title}</option>)}
                                    </select>
                                    <div className="flex gap-2 items-center">
                                        <input ref={pagesInputRef} type="number" min="0" max="500" value={pagesInput} onChange={e=>setPagesInput(e.target.value)}
                                            onKeyDown={e=>e.key==='Enter'&&saveReading()} placeholder="Pages today"
                                            className="flex-1 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-amber-500"/>
                                        <span className="text-sm text-slate-400">pages</span>
                                        <button onClick={saveReading} className="px-4 py-2.5 bg-amber-500 text-white text-sm rounded-xl font-medium hover:bg-amber-600 transition">Save</button>
                                    </div>
                                    {log.pagesRead>0 && <p className="text-xs text-amber-600">✓ {log.pagesRead} pages{readBook?` — ${readBook.title}`:''}</p>}
                                </div>
                            ) : <p className="text-sm text-slate-400">Add a book in the Reading tab first.</p>}
                        </Section>

                        {/* Day score */}
                        <div className={`rounded-2xl p-5 text-center border ${goalsHit>=5?'bg-emerald-50 border-emerald-200':goalsHit>=3?'bg-amber-50 border-amber-200':'bg-slate-50 border-slate-200'}`}>
                            <div className="text-4xl mb-1">{goalsHit===6?'🔥':goalsHit>=4?'💪':'⏳'}</div>
                            <p className={`text-2xl font-bold ${goalsHit>=5?'text-emerald-700':goalsHit>=3?'text-amber-700':'text-slate-500'}`}>{goalsHit}<span className="text-base font-normal text-slate-400">/6</span></p>
                            <p className="text-xs text-slate-400 mt-1">{goalsHit===6?'Perfect day. Absolutely elite.':goalsHit>=4?'Solid. Push one more.':'Every bit counts. Keep moving.'}</p>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    // ── WEEKLY VIEW ───────────────────────────────────────────────────────────
    function WeeklyView({ data, today, save }) {
        const logs = data.dailyLogs;
        const ws = getWeekStart(today);
        const wDates = getWeekDates(ws);
        const wg = data.weeklyGoals?.[ws] || null;
        const ws_ = weekStats(logs, ws);

        const [editing, setEditing] = useState(false);
        const [draft, setDraft]     = useState(null);

        const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

        const openEdit = () => {
            setDraft(wg ? {...wg, custom:[...(wg.custom||[]).map(g=>({...g}))]} : {gymSessions:4,runKm:25,studyHours:21,pagesRead:140,custom:[]});
            setEditing(true);
        };
        const saveDraft = () => {
            if(!draft) return;
            const nd = {...data, weeklyGoals:{...(data.weeklyGoals||{}), [ws]: draft}};
            save(nd);
            setEditing(false);
            setDraft(null);
        };

        const GBar = ({label,icon,actual,target,unit}) => {
            if(!target||target<=0) return null;
            const pct = Math.min(100,(actual/target)*100);
            const done = actual >= target;
            return (
                <div className="space-y-1.5">
                    <div className="flex justify-between items-center">
                        <span className="text-sm text-slate-700">{icon} {label}</span>
                        <span className={`text-sm font-semibold ${done?'text-emerald-600':'text-slate-600'}`}>
                            {typeof actual==='number'&&actual%1!==0?actual.toFixed(1):actual} / {target} {unit}{done?' ✓':''}
                        </span>
                    </div>
                    <div className="bg-slate-100 rounded-full h-2">
                        <div className={`rounded-full h-2 transition-all ${done?'bg-emerald-500':'bg-blue-500'}`} style={{width:`${pct}%`}}/>
                    </div>
                </div>
            );
        };

        const weekLabel = (() => {
            const s = parseD(ws); const e = new Date(s); e.setDate(e.getDate()+6);
            return `${s.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${e.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
        })();

        return (
            <div className="space-y-5">
                <div className="flex items-center justify-between">
                    <div>
                        <h2 className="text-xl font-bold text-slate-800">📅 Weekly Goals</h2>
                        <p className="text-sm text-slate-400 mt-0.5">{weekLabel}</p>
                    </div>
                    <button onClick={openEdit} className="text-sm font-medium text-blue-600 hover:text-blue-800 bg-blue-50 border border-blue-200 px-3 py-1.5 rounded-xl transition">
                        {wg ? 'Edit targets' : 'Set targets'}
                    </button>
                </div>

                {!wg ? (
                    <div className="bg-slate-50 border border-slate-200 rounded-2xl p-6 text-center">
                        <p className="text-3xl mb-2">📅</p>
                        <p className="font-semibold text-slate-700 mb-1">No targets for this week</p>
                        <p className="text-sm text-slate-400 mb-4">Set weekly targets to track your progress here.</p>
                        <button onClick={openEdit} className="bg-blue-600 text-white rounded-xl px-5 py-2.5 text-sm font-semibold hover:bg-blue-700 transition">Set this week's targets</button>
                    </div>
                ) : (
                    <div className="bg-white rounded-2xl border border-slate-100 p-5 space-y-4">
                        <GBar label="Gym sessions"  icon="🏋️" actual={ws_.gymSessions} target={wg.gymSessions}  unit="sessions"/>
                        <GBar label="Running"        icon="🏃" actual={ws_.runKm}       target={wg.runKm}        unit="km"/>
                        <GBar label="Study"          icon="📚" actual={ws_.studyHours}  target={wg.studyHours}   unit="h"/>
                        <GBar label="Reading"        icon="📖" actual={ws_.pagesRead}   target={wg.pagesRead}    unit="pages"/>
                        {(wg.custom||[]).map(g => {
                            const actual = wDates.reduce((s,d)=>{
                                const v = logs[d]?.[`cg_${g.id}`];
                                return s + (g.type==='boolean'?(v?1:0):(parseFloat(v)||0));
                            }, 0);
                            return <GBar key={g.id} label={g.label} icon="⭐" actual={actual} target={g.target||1} unit={g.type==='boolean'?'days':''}/>;
                        })}
                    </div>
                )}

                {/* Edit form */}
                {editing && draft && (
                    <div className="bg-white rounded-2xl border border-slate-200 p-5 space-y-4">
                        <p className="font-semibold text-slate-800">Set weekly targets</p>
                        <div className="grid grid-cols-2 gap-3">
                            {[['gymSessions','Gym sessions','sessions'],['runKm','Running (km)','km'],['studyHours','Study (h)','h'],['pagesRead','Reading (pages)','pg']].map(([key,lbl,unit])=>(
                                <div key={key}>
                                    <label className="text-xs text-slate-500 mb-1 block">{lbl}</label>
                                    <input type="number" min="0" step={key==='gymSessions'?1:0.5} value={draft[key]||''} onChange={e=>setDraft(d=>({...d,[key]:parseFloat(e.target.value)||0}))}
                                        placeholder="0 = skip" className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400"/>
                                </div>
                            ))}
                        </div>
                        {(draft.custom||[]).map((g,i)=>(
                            <div key={g.id} className="flex gap-2 items-center">
                                <input type="text" value={g.label} onChange={e=>setDraft(d=>({...d,custom:d.custom.map((x,j)=>j===i?{...x,label:e.target.value}:x)}))}
                                    placeholder="Goal label" className="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none"/>
                                <select value={g.type} onChange={e=>setDraft(d=>({...d,custom:d.custom.map((x,j)=>j===i?{...x,type:e.target.value}:x)}))}
                                    className="border border-slate-200 rounded-xl px-2 py-2 text-sm focus:outline-none">
                                    <option value="boolean">Days</option><option value="number">Total</option>
                                </select>
                                <input type="number" min="1" value={g.target||1} onChange={e=>setDraft(d=>({...d,custom:d.custom.map((x,j)=>j===i?{...x,target:parseFloat(e.target.value)||1}:x)}))}
                                    className="w-16 border border-slate-200 rounded-xl px-2 py-2 text-sm focus:outline-none"/>
                                <button onClick={()=>setDraft(d=>({...d,custom:d.custom.filter((_,j)=>j!==i)}))} className="text-red-400 hover:text-red-600 text-lg px-1">×</button>
                            </div>
                        ))}
                        <button onClick={()=>setDraft(d=>({...d,custom:[...(d.custom||[]),{id:Date.now(),label:'',type:'boolean',target:7}]}))}
                            className="text-sm text-blue-500 hover:text-blue-700">+ Add custom goal</button>
                        <div className="flex gap-2 pt-2">
                            <button onClick={saveDraft} className="flex-1 bg-blue-600 text-white rounded-xl py-2.5 text-sm font-semibold hover:bg-blue-700 transition">Save targets</button>
                            <button onClick={()=>{setEditing(false);setDraft(null);}} className="flex-1 border border-slate-200 text-slate-600 rounded-xl py-2.5 text-sm hover:bg-slate-50 transition">Cancel</button>
                        </div>
                    </div>
                )}

                {/* Day breakdown */}
                <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
                    <p className="px-5 py-3 text-xs font-semibold text-slate-400 uppercase tracking-widest border-b border-slate-100">Day breakdown</p>
                    <div className="overflow-x-auto">
                        <table className="w-full text-xs text-center">
                            <thead>
                                <tr className="border-b border-slate-100">
                                    <th className="py-2 px-3 text-left text-slate-500 font-medium">Metric</th>
                                    {wDates.map((d,i)=><th key={d} className={`py-2 px-2 font-medium ${d===today?'text-blue-600':'text-slate-500'}`}>{DAYS[i]}</th>)}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-50">
                                <tr>
                                    <td className="py-2 px-3 text-left text-slate-600">🏋️ Gym</td>
                                    {wDates.map(d=><td key={d} className={`py-2 px-2 ${logs[d]?.gym?'text-emerald-600 font-bold':'text-slate-300'}`}>{logs[d]?.gym?'✓':'–'}</td>)}
                                </tr>
                                <tr>
                                    <td className="py-2 px-3 text-left text-slate-600">🏃 Run</td>
                                    {wDates.map(d=><td key={d} className={`py-2 px-2 ${(parseFloat(logs[d]?.runKm)||0)>0?'text-sky-600':'text-slate-300'}`}>
                                        {(parseFloat(logs[d]?.runKm)||0)>0?`${logs[d].runKm}k`:'–'}
                                    </td>)}
                                </tr>
                                <tr>
                                    <td className="py-2 px-3 text-left text-slate-600">📚 Study</td>
                                    {wDates.map(d=>{const h=parseFloat(logs[d]?.studyHours)||0;return<td key={d} className={`py-2 px-2 ${h>0?'text-blue-600':'text-slate-300'}`}>{h>0?`${h}h`:'–'}</td>;})}
                                </tr>
                                <tr>
                                    <td className="py-2 px-3 text-left text-slate-600">📖 Pages</td>
                                    {wDates.map(d=>{const p=parseInt(logs[d]?.pagesRead)||0;return<td key={d} className={`py-2 px-2 ${p>0?'text-amber-600':'text-slate-300'}`}>{p>0?p:'–'}</td>;})}
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        );
    }

    // ── MONTHLY VIEW ──────────────────────────────────────────────────────────
    function MonthlyView({ data, today, save }) {
        const logs = data.dailyLogs;
        const monthKey = today.slice(0,7);
        const mg = data.monthlyGoals?.[monthKey] || null;
        const ms = monthStats(logs, monthKey);
        const monthInfo = MONTHS.find(m=>m.key===monthKey);

        const [editing, setEditing] = useState(false);
        const [draft, setDraft]     = useState(null);

        const openEdit = () => {
            setDraft(mg ? {...mg, custom:[...(mg.custom||[]).map(g=>({...g}))]} : {gymSessions:16,runKm:100,studyHours:84,pagesRead:560,custom:[]});
            setEditing(true);
        };
        const saveDraft = () => {
            if(!draft) return;
            const nd = {...data, monthlyGoals:{...(data.monthlyGoals||{}), [monthKey]: draft}};
            save(nd);
            setEditing(false);
            setDraft(null);
        };

        const GBar = ({label,icon,actual,target,unit}) => {
            if(!target||target<=0) return null;
            const pct = Math.min(100,(actual/target)*100);
            const done = actual >= target;
            return (
                <div className="space-y-1.5">
                    <div className="flex justify-between items-center">
                        <span className="text-sm text-slate-700">{icon} {label}</span>
                        <span className={`text-sm font-semibold ${done?'text-emerald-600':'text-slate-600'}`}>
                            {typeof actual==='number'&&actual%1!==0?actual.toFixed(1):actual} / {target} {unit}{done?' ✓':''}
                        </span>
                    </div>
                    <div className="bg-slate-100 rounded-full h-2">
                        <div className={`rounded-full h-2 transition-all ${done?'bg-emerald-500':'bg-blue-500'}`} style={{width:`${pct}%`}}/>
                    </div>
                </div>
            );
        };

        // Build week-by-week breakdown for the month
        const monthEntries = Object.entries(logs).filter(([d])=>d.startsWith(monthKey)).sort(([a],[b])=>a<b?-1:1);
        const weeksInMonth = [];
        const seenWeeks = new Set();
        monthEntries.forEach(([d])=>{
            const ws = getWeekStart(d);
            if(!seenWeeks.has(ws)){ seenWeeks.add(ws); weeksInMonth.push(ws); }
        });

        return (
            <div className="space-y-5">
                <div className="flex items-center justify-between">
                    <div>
                        <h2 className="text-xl font-bold text-slate-800">🗓 Monthly Goals</h2>
                        <p className="text-sm text-slate-400 mt-0.5">{monthInfo?.label||monthKey}{monthInfo?.theme?` · ${monthInfo.theme}`:''}</p>
                    </div>
                    <button onClick={openEdit} className="text-sm font-medium text-blue-600 hover:text-blue-800 bg-blue-50 border border-blue-200 px-3 py-1.5 rounded-xl transition">
                        {mg ? 'Edit targets' : 'Set targets'}
                    </button>
                </div>

                {!mg ? (
                    <div className="bg-slate-50 border border-slate-200 rounded-2xl p-6 text-center">
                        <p className="text-3xl mb-2">🗓</p>
                        <p className="font-semibold text-slate-700 mb-1">No targets for this month</p>
                        <p className="text-sm text-slate-400 mb-4">Set monthly targets to see your progress.</p>
                        <button onClick={openEdit} className="bg-blue-600 text-white rounded-xl px-5 py-2.5 text-sm font-semibold hover:bg-blue-700 transition">Set this month's targets</button>
                    </div>
                ) : (
                    <div className="bg-white rounded-2xl border border-slate-100 p-5 space-y-4">
                        <GBar label="Gym sessions"  icon="🏋️" actual={ms.gymSessions} target={mg.gymSessions}  unit="sessions"/>
                        <GBar label="Running"        icon="🏃" actual={ms.runKm}       target={mg.runKm}        unit="km"/>
                        <GBar label="Study"          icon="📚" actual={ms.studyHours}  target={mg.studyHours}   unit="h"/>
                        <GBar label="Reading"        icon="📖" actual={ms.pagesRead}   target={mg.pagesRead}    unit="pages"/>
                        {(mg.custom||[]).map(g => {
                            const actual = Object.entries(logs).filter(([d])=>d.startsWith(monthKey)).reduce((s,[d,l])=>{
                                const v = l[`cg_${g.id}`];
                                return s + (g.type==='boolean'?(v?1:0):(parseFloat(v)||0));
                            }, 0);
                            return <GBar key={g.id} label={g.label} icon="⭐" actual={actual} target={g.target||1} unit={g.type==='boolean'?'days':''}/>;
                        })}
                    </div>
                )}

                {/* Edit form */}
                {editing && draft && (
                    <div className="bg-white rounded-2xl border border-slate-200 p-5 space-y-4">
                        <p className="font-semibold text-slate-800">Set monthly targets</p>
                        <div className="grid grid-cols-2 gap-3">
                            {[['gymSessions','Gym sessions'],['runKm','Running (km)'],['studyHours','Study (h)'],['pagesRead','Reading (pages)']].map(([key,lbl])=>(
                                <div key={key}>
                                    <label className="text-xs text-slate-500 mb-1 block">{lbl}</label>
                                    <input type="number" min="0" step={key==='gymSessions'?1:1} value={draft[key]||''} onChange={e=>setDraft(d=>({...d,[key]:parseFloat(e.target.value)||0}))}
                                        placeholder="0 = skip" className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400"/>
                                </div>
                            ))}
                        </div>
                        {(draft.custom||[]).map((g,i)=>(
                            <div key={g.id} className="flex gap-2 items-center">
                                <input type="text" value={g.label} onChange={e=>setDraft(d=>({...d,custom:d.custom.map((x,j)=>j===i?{...x,label:e.target.value}:x)}))}
                                    placeholder="Goal label" className="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none"/>
                                <select value={g.type} onChange={e=>setDraft(d=>({...d,custom:d.custom.map((x,j)=>j===i?{...x,type:e.target.value}:x)}))}
                                    className="border border-slate-200 rounded-xl px-2 py-2 text-sm focus:outline-none">
                                    <option value="boolean">Days</option><option value="number">Total</option>
                                </select>
                                <input type="number" min="1" value={g.target||1} onChange={e=>setDraft(d=>({...d,custom:d.custom.map((x,j)=>j===i?{...x,target:parseFloat(e.target.value)||1}:x)}))}
                                    className="w-16 border border-slate-200 rounded-xl px-2 py-2 text-sm focus:outline-none"/>
                                <button onClick={()=>setDraft(d=>({...d,custom:d.custom.filter((_,j)=>j!==i)}))} className="text-red-400 hover:text-red-600 text-lg px-1">×</button>
                            </div>
                        ))}
                        <button onClick={()=>setDraft(d=>({...d,custom:[...(d.custom||[]),{id:Date.now(),label:'',type:'boolean',target:30}]}))}
                            className="text-sm text-blue-500 hover:text-blue-700">+ Add custom goal</button>
                        <div className="flex gap-2 pt-2">
                            <button onClick={saveDraft} className="flex-1 bg-blue-600 text-white rounded-xl py-2.5 text-sm font-semibold hover:bg-blue-700 transition">Save targets</button>
                            <button onClick={()=>{setEditing(false);setDraft(null);}} className="flex-1 border border-slate-200 text-slate-600 rounded-xl py-2.5 text-sm hover:bg-slate-50 transition">Cancel</button>
                        </div>
                    </div>
                )}

                {/* Week-by-week breakdown */}
                {weeksInMonth.length > 0 && (
                    <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
                        <p className="px-5 py-3 text-xs font-semibold text-slate-400 uppercase tracking-widest border-b border-slate-100">Week by week</p>
                        <div className="divide-y divide-slate-50">
                            {weeksInMonth.map(ws=>{
                                const wst = weekStats(logs, ws);
                                const wStart = parseD(ws); const wEnd = new Date(wStart); wEnd.setDate(wEnd.getDate()+6);
                                const label = `${wStart.toLocaleDateString('en-US',{month:'short',day:'numeric'})}–${wEnd.getDate()}`;
                                return (
                                    <div key={ws} className="flex items-center justify-between px-5 py-3">
                                        <span className="text-xs text-slate-500 w-24">{label}</span>
                                        <div className="flex gap-4 text-xs">
                                            <span className={`${wst.gymSessions>0?'text-emerald-600':'text-slate-300'}`}>🏋️ {wst.gymSessions}</span>
                                            <span className={`${wst.runKm>0?'text-sky-600':'text-slate-300'}`}>🏃 {wst.runKm.toFixed(1)}km</span>
                                            <span className={`${wst.studyHours>0?'text-blue-600':'text-slate-300'}`}>📚 {wst.studyHours.toFixed(1)}h</span>
                                            <span className={`${wst.pagesRead>0?'text-amber-600':'text-slate-300'}`}>📖 {wst.pagesRead}p</span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // ── ISB VIEW ─────────────────────────────────────────────────────────────
    function ISBView({ data, save, today }) {
        const logs = data.dailyLogs;
        const ws   = getWeekStart(today);
        const wDates = getWeekDates(ws);

        let streak = 0;
        { const cd=new Date(parseD(today)); for(let i=0;i<200;i++){const ds=fmtDate(cd);const h=parseFloat(logs[ds]?.studyHours)||0;if(h>=(isWeekend(ds)?5:3)){streak++;cd.setDate(cd.getDate()-1);}else break;} }

        const hoursWk  = wDates.reduce((s,d)=>s+(parseFloat(logs[d]?.studyHours)||0),0);
        const elapsed  = Math.max(1, daysBetween(CHALLENGE_START,today)+1);
        const targetDs = Object.keys(logs).filter(d=>d>=CHALLENGE_START&&d<=today).filter(d=>{const h=parseFloat(logs[d]?.studyHours)||0;return isWeekend(d)?h>=5:h>=3;}).length;
        const hoursMth = Object.entries(logs).filter(([d])=>d.startsWith(today.substring(0,7))).reduce((s,[_,l])=>s+(parseFloat(l.studyHours)||0),0);

        return (
            <div className="space-y-5">
                <div>
                    <h2 className="text-xl font-bold text-slate-800">🎓 ISB Preparation</h2>

                </div>

                <div className="grid grid-cols-3 gap-3">
                    <StatTile big={streak} sub="day streak" icon="🔥" bright={streak>0} />
                    <StatTile big={`${targetDs}/${elapsed}`} sub="days on target" icon="📅" />
                    <StatTile big={`${hoursMth.toFixed(0)}h`} sub="this month" icon="📚" />
                </div>

                {/* 7-day chart */}
                <div className="bg-white rounded-2xl p-5 border border-slate-100">
                    <div className="flex justify-between items-center mb-4">
                        <p className="font-semibold text-slate-800">This Week</p>
                        <span className={`text-sm font-semibold ${hoursWk>=21?'text-emerald-600':'text-slate-500'}`}>{hoursWk.toFixed(1)}h / 25h goal</span>
                    </div>
                    <div className="flex gap-2 items-end" style={{height:'90px'}}>
                        {wDates.map(d=>{
                            const h    = parseFloat(logs[d]?.studyHours)||0;
                            const goal = isWeekend(d)?5:3;
                            const max  = isWeekend(d)?5:3;
                            const pct  = Math.min(100,(h/max)*100);
                            const met  = h>=goal;
                            const isT  = d===today;
                            return (
                                <div key={d} className="flex-1 flex flex-col items-center gap-1">
                                    <div className="w-full bg-slate-100 rounded-t relative" style={{height:'64px'}}>
                                        <div className={`absolute bottom-0 w-full rounded-t transition-all ${met?'bg-blue-500':h>0?'bg-blue-300':''}`} style={{height:`${pct}%`}}/>
                                    </div>
                                    <span className={`text-xs ${isT?'font-bold text-blue-600':'text-slate-400'}`}>{parseD(d).toLocaleDateString('en-US',{weekday:'narrow'})}</span>
                                    {h>0&&<span className={`text-xs font-semibold ${met?'text-blue-600':'text-amber-500'}`}>{h}h</span>}
                                </div>
                            );
                        })}
                    </div>
                    <div className="bg-slate-100 rounded-full h-2 mt-3">
                        <div className={`${hoursWk>=21?'bg-blue-600':'bg-blue-400'} rounded-full h-2`} style={{width:`${Math.min(100,(hoursWk/25)*100)}%`}}/>
                    </div>
                </div>

                {/* Monthly hours */}
                <div className="bg-white rounded-2xl p-5 border border-slate-100">
                    <p className="font-semibold text-slate-800 mb-4">Monthly Hours</p>
                    <div className="space-y-2.5">
                        {MONTHS.map(m=>{
                            const h    = Object.entries(logs).filter(([d])=>d.startsWith(m.key)).reduce((s,[_,l])=>s+(parseFloat(l.studyHours)||0),0);
                            const isCur= today.startsWith(m.key);
                            const fut  = m.key > today.substring(0,7);
                            return (
                                <div key={m.key} className={fut?'opacity-30':''}>
                                    <div className="flex justify-between text-xs mb-1">
                                        <span className={isCur?'font-semibold text-blue-700':'text-slate-600'}>{m.label}{isCur?' ← now':''}</span>
                                        <span className={h>0?'text-blue-600 font-semibold':'text-slate-300'}>{h.toFixed(0)}h</span>
                                    </div>
                                    <div className="bg-slate-100 rounded-full h-2">
                                        <div className="bg-blue-500 rounded-full h-2 transition-all" style={{width:`${Math.min(100,(h/100)*100)}%`}}/>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>

                <MonthlyNotes data={data} save={save} noteKey="studies" title="Monthly ISB Notes" today={today} color="focus:border-blue-400" />
            </div>
        );
    }

    // ── FITNESS VIEW ──────────────────────────────────────────────────────────
    function FitnessView({ data, save, today }) {
        const logs = data.dailyLogs;
        const ws   = getWeekStart(today);
        const wDates = getWeekDates(ws);

        const wEntries = Object.entries(logs).filter(([_,l])=>l.weight).sort(([a],[b])=>a<b?-1:1);
        const latestW  = wEntries.length ? wEntries[wEntries.length-1][1].weight : null;
        const startW   = wEntries.length ? wEntries[0][1].weight : null;
        const daysToJuly  = Math.max(0,daysBetween(today,'2026-07-01'));
        const daysToHyrox = Math.max(0,daysBetween(today,HYROX_DATE));

        const gymWk       = wDates.filter(d=>logs[d]?.gym).length;
        const runWk       = wDates.filter(d=>logs[d]?.running).length;
        const runKmWk     = wDates.reduce((s,d)=>s+(parseFloat(logs[d]?.runKm)||0),0);
        const runSpeedWk  = (() => { const runs=wDates.filter(d=>(parseFloat(logs[d]?.runSpeed)||0)>0); return runs.length ? runs.reduce((s,d)=>s+(parseFloat(logs[d].runSpeed)||0),0)/runs.length : 0; })();
        const teaWk       = wDates.filter(d=>logs[d]?.greenTea).length;
        const outsWk      = wDates.filter(d=>logs[d]?.outsideFood).length;
        const screenOkWk  = wDates.filter(d=>{const h=parseFloat(logs[d]?.screenTime)||0;const goal=isWeekend(d)?4:3;return h>0&&h<=goal;}).length;
        const screenLogWk = wDates.filter(d=>(parseFloat(logs[d]?.screenTime)||0)>0).length;

        // Monthly run stats
        const curMonth = today.substring(0,7);
        const runKmMonth = Object.entries(logs).filter(([d])=>d.startsWith(curMonth)).reduce((s,[,l])=>s+(parseFloat(l.runKm)||0),0);

        // Last 30 days calendar
        const last30 = Array.from({length:30},(_,i)=>{
            const d=parseD(today); d.setDate(d.getDate()-29+i);
            const ds=fmtDate(d);
            return {ds,day:d.getDate(),gym:logs[ds]?.gym||false,run:logs[ds]?.running||false};
        });

        return (
            <div className="space-y-5">
                <div>
                    <h2 className="text-xl font-bold text-slate-800">🏋️ Fitness</h2>
                    <p className="text-sm text-slate-400 mt-0.5">🏁 Hyrox Apr 12 (≤81 kg) · 78 kg by July</p>
                </div>

                {/* Weight hero */}
                <div className="bg-gradient-to-br from-emerald-600 to-green-700 text-white rounded-2xl p-6">
                    {latestW ? (<>
                        <p className="text-sm opacity-75">Current weight</p>
                        <p className="text-5xl font-bold">{latestW} kg</p>
                        <div className="grid grid-cols-2 gap-4 mt-4">
                            <div><p className="text-sm opacity-75">🏁 Hyrox Apr 12</p><p className="font-semibold">{daysToHyrox > 0 ? `${daysToHyrox}d away` : 'Done!'} · need ≤{HYROX_WEIGHT} kg</p></div>
                            <div><p className="text-sm opacity-75">🎯 78 kg by July</p><p className="font-semibold">{latestW>78?`${(latestW-78).toFixed(1)} kg to lose`:'✓ At target'} · {daysToJuly}d</p></div>
                        </div>
                        {startW && latestW<startW && <p className="text-sm opacity-75 mt-2">↓ {(startW-latestW).toFixed(1)} kg lost since start</p>}
                    </>) : (<>
                        <p className="text-sm opacity-75">No weight logged yet</p>
                        <p className="text-2xl font-bold mt-1">Log your weight daily →</p>
                        <p className="text-sm opacity-60 mt-2">Go to Log tab to log today's weight</p>
                    </>)}
                </div>

                {/* This week habits */}
                <div className="bg-white rounded-2xl p-5 border border-slate-100">
                    <p className="font-semibold text-slate-800 mb-4">This Week</p>
                    <div className="space-y-3">
                        <HBar label="🏋️ Gym"       val={gymWk}      max={4} color="bg-emerald-500" />
                        <HBar label="🏃 Running"    val={runWk}      max={4} color="bg-sky-500" />
                        {runKmWk > 0 && <div className="flex justify-between text-xs text-slate-500 -mt-1 px-1"><span>📍 {runKmWk.toFixed(1)} km this week</span>{runSpeedWk>0&&<span>⚡ avg {fmtPace(runSpeedWk)}</span>}</div>}
                        {runKmMonth > 0 && <div className="text-xs text-sky-600 px-1">🗓 {runKmMonth.toFixed(1)} km this month</div>}
                        <HBar label="🍵 Green Tea"  val={teaWk}      max={5} color="bg-teal-500" />
                        <HBar label="📱 Screen ≤ goal" val={screenOkWk} max={7} color="bg-slate-500" />
                    </div>
                    <div className="mt-3 pt-3 border-t border-slate-50 text-xs text-slate-400 flex flex-wrap gap-3">
                        <span>🍔 Outside food: {outsWk}d</span>
                        <span>🎉 Cheat meals: {wDates.filter(d=>logs[d]?.cheatMeal).length}</span>
                        {screenLogWk > 0 && <span className={screenOkWk===screenLogWk?'text-emerald-600':'text-red-400'}>📱 Under goal: {screenOkWk}/{screenLogWk} days logged</span>}
                    </div>
                </div>

                {/* Weight chart */}
                <div className="bg-white rounded-2xl p-5 border border-slate-100">
                    <div className="flex justify-between items-center mb-1">
                        <p className="font-semibold text-slate-800">Weight Progress</p>
                        {wEntries.length>0&&<span className="text-xs text-slate-400">{wEntries.length} entries</span>}
                    </div>
                    <div className="flex gap-4 text-xs mb-4">
                        <span className="text-amber-600 font-medium">─ 78kg (July)</span>
                        <span className="text-violet-500 font-medium">─ 81kg (Hyrox)</span>
                    </div>
                    {wEntries.length<2 ? (
                        <div className="py-8 text-center text-slate-400 text-sm">Log weight daily to see your chart here.</div>
                    ) : <WeightChart entries={wEntries}/>}
                </div>

                {/* 30-day gym/run calendar */}
                <div className="bg-white rounded-2xl p-5 border border-slate-100">
                    <p className="font-semibold text-slate-800 mb-1">Last 30 Days</p>
                    <div className="flex gap-4 text-xs mb-3 text-slate-600">
                        <span><span className="inline-block w-3 h-3 rounded-full bg-emerald-500 mr-1"/>Gym+Run</span>
                        <span><span className="inline-block w-3 h-3 rounded-full bg-blue-500 mr-1"/>Gym</span>
                        <span><span className="inline-block w-3 h-3 rounded-full bg-sky-400 mr-1"/>Run</span>
                    </div>
                    <div className="grid grid-cols-10 gap-1.5">
                        {last30.map(d=>(
                            <div key={d.ds} className="flex flex-col items-center gap-0.5">
                                <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-medium ${d.gym&&d.run?'bg-emerald-500 text-white':d.gym?'bg-blue-500 text-white':d.run?'bg-sky-400 text-white':'bg-slate-100 text-slate-400'}`}>
                                    {d.day}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>

                <MonthlyNotes data={data} save={save} noteKey="health" title="Monthly Fitness Notes" today={today} color="focus:border-emerald-400" />
            </div>
        );
    }

    // ── READING VIEW ──────────────────────────────────────────────────────────
    function ReadingView({ data, save, today }) {
        const [showAdd, setShowAdd] = useState(false);
        const [title, setTitle]     = useState('');
        const [pages, setPages]     = useState('');
        const [pageInputs, setPageInputs] = useState({});
        const logs = data.dailyLogs;

        const totalPgs   = Object.values(logs).reduce((s,l)=>s+(l.pagesRead||0),0);
        const readDays   = Object.values(logs).filter(l=>(l.pagesRead||0)>0).length;
        const avgPgs     = readDays>0?(totalPgs/readDays).toFixed(0):0;
        const finished   = data.books.filter(b=>b.finishedDate);
        const active     = data.books.filter(b=>!b.finishedDate);

        const history = Object.entries(logs).filter(([_,l])=>(l.pagesRead||0)>0).sort(([a],[b])=>b<a?-1:1).slice(0,20);

        const addBook = () => {
            if (!title.trim()||!pages) return;
            const book={id:Date.now(),title:title.trim(),totalPages:parseInt(pages),currentPage:0,startDate:fmtDate(new Date()),finishedDate:null};
            save({...data,books:[...data.books,book],currentBookId:book.id});
            setTitle(''); setPages(''); setShowAdd(false);
        };
        const setPage = bookId => {
            const p=parseInt(pageInputs[bookId]); if(isNaN(p)||p<0) return;
            const book=data.books.find(b=>b.id===bookId);
            const np=Math.min(p,book.totalPages); const done=np>=book.totalPages;
            save({...data,books:data.books.map(b=>b.id===bookId?{...b,currentPage:np,finishedDate:done&&!b.finishedDate?fmtDate(new Date()):b.finishedDate}:b),currentBookId:done&&data.currentBookId===bookId?null:data.currentBookId});
            setPageInputs(p=>({...p,[bookId]:''}));
        };
        const deleteBook = bookId => {
            if(!confirm('Delete this book? This will also remove all daily reading logs for this book.')) return;
            const newBooks = data.books.filter(b=>b.id!==bookId);
            const newLogs = Object.fromEntries(
                Object.entries(data.dailyLogs).map(([d,l])=>[d, l.readingBookId===bookId ? {...l,readingBookId:null,pagesRead:0} : l])
            );
            save({...data, books:newBooks, dailyLogs:newLogs, currentBookId:data.currentBookId===bookId?null:data.currentBookId});
        };

        return (
            <div className="space-y-5">
                <div className="flex justify-between items-center">
                    <div><h2 className="text-xl font-bold text-slate-800">📖 Reading</h2><p className="text-sm text-slate-400 mt-0.5">Build the habit — every page counts</p></div>
                    <button onClick={()=>setShowAdd(!showAdd)} className="px-4 py-2 bg-amber-500 text-white text-sm rounded-xl font-medium hover:bg-amber-600 transition">+ Add Book</button>
                </div>

                {/* Stats */}
                <div className="grid grid-cols-4 gap-3">
                    <StatTile big={totalPgs} sub="total pages" />
                    <StatTile big={readDays} sub="days read" />
                    <StatTile big={avgPgs} sub="avg/day" />
                    <StatTile big={finished.length} sub="books done" />
                </div>

                {/* Add book form */}
                {showAdd && (
                    <div className="bg-white rounded-2xl p-5 border border-amber-200 border-l-4 border-l-amber-500">
                        <h3 className="font-semibold text-slate-800 mb-3">New Book</h3>
                        <div className="space-y-2">
                            <input type="text" value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addBook()}
                                placeholder="Book title" className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-amber-500"/>
                            <input type="number" value={pages} onChange={e=>setPages(e.target.value)} placeholder="Total pages"
                                className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-amber-500"/>
                            <div className="flex gap-2">
                                <button onClick={addBook} className="flex-1 py-2.5 bg-amber-500 text-white text-sm rounded-xl font-medium hover:bg-amber-600 transition">Add</button>
                                <button onClick={()=>setShowAdd(false)} className="px-4 py-2.5 bg-slate-100 text-slate-600 text-sm rounded-xl hover:bg-slate-200 transition">Cancel</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* Active books */}
                {active.map(book=>{
                    const pct=book.totalPages>0?(book.currentPage/book.totalPages*100):0;
                    const cur=book.id===data.currentBookId;
                    const bookPgs=Object.values(logs).filter(l=>l.readingBookId===book.id).reduce((s,l)=>s+(l.pagesRead||0),0);
                    return (
                        <div key={book.id} className={`bg-white rounded-2xl p-5 border ${cur?'border-amber-300 border-l-4 border-l-amber-500':'border-slate-100'}`}>
                            <div className="flex justify-between items-start mb-3">
                                <div className="flex-1 pr-3">
                                    <h4 className="font-semibold text-slate-800">{book.title}</h4>
                                    <p className="text-xs text-slate-400 mt-0.5">Started {book.startDate}{bookPgs>0?` · ${bookPgs} pages via daily log`:''}</p>
                                </div>
                                {cur ? <span className="text-xs bg-amber-100 text-amber-700 px-2 py-1 rounded-lg font-medium">Reading now</span>
                                     : <button onClick={()=>save({...data,currentBookId:book.id})} className="text-xs text-amber-600 border border-amber-300 px-2 py-1 rounded-lg hover:bg-amber-50 transition">Set current</button>}
                            </div>
                            <div className="mb-3">
                                <div className="flex justify-between text-xs text-slate-500 mb-1.5">
                                    <span>Page {book.currentPage} of {book.totalPages}</span>
                                    <span className="font-semibold">{pct.toFixed(0)}%</span>
                                </div>
                                <div className="bg-slate-100 rounded-full h-3"><div className="bg-amber-500 rounded-full h-3 transition-all" style={{width:`${pct}%`}}/></div>
                                {book.totalPages-book.currentPage>0&&<p className="text-xs text-slate-400 mt-1">{book.totalPages-book.currentPage} pages left</p>}
                            </div>
                            <div className="flex gap-2">
                                <input type="number" min="0" max={book.totalPages} value={pageInputs[book.id]||''} onChange={e=>setPageInputs(p=>({...p,[book.id]:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&setPage(book.id)}
                                    placeholder={`Set page directly (now: ${book.currentPage})`}
                                    className="flex-1 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-amber-500"/>
                                <button onClick={()=>setPage(book.id)} className="px-4 py-2.5 bg-amber-500 text-white text-sm rounded-xl font-medium hover:bg-amber-600 transition">Set</button>
                            </div>
                            <div className="flex justify-between items-center mt-2">
                                <p className="text-xs text-slate-400">Log pages in the Log tab to auto-update progress.</p>
                                <button onClick={()=>deleteBook(book.id)} className="text-xs text-red-500 hover:text-red-700 transition">🗑️ Delete</button>
                            </div>
                        </div>
                    );
                })}

                {/* Daily history */}
                {history.length>0 && (
                    <div className="bg-white rounded-2xl p-5 border border-slate-100">
                        <p className="font-semibold text-slate-800 mb-3">Reading Log</p>
                        <div className="space-y-1.5">
                            {history.map(([date,log])=>{
                                const book=data.books.find(b=>b.id===log.readingBookId);
                                return (
                                    <div key={date} className="flex items-center gap-3 py-1.5 border-b border-slate-50 last:border-0">
                                        <span className="text-xs text-slate-400 w-20 flex-shrink-0">{parseD(date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
                                        <span className="text-sm font-semibold text-amber-600">{log.pagesRead}p</span>
                                        <span className="text-xs text-slate-500 truncate">{book?.title||'—'}</span>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                )}

                {/* Finished */}
                {finished.length>0 && (
                    <div className="bg-white rounded-2xl p-5 border border-slate-100">
                        <p className="font-semibold text-slate-800 mb-3">✅ Finished — {finished.length} book{finished.length>1?'s':''}</p>
                        <div className="space-y-2">
                            {finished.map(b=>(
                                <div key={b.id} className="flex items-center justify-between gap-3 p-2">
                                    <div className="flex items-center gap-3">
                                        <span className="text-lg">📗</span>
                                        <div><p className="text-sm font-medium text-slate-700">{b.title}</p><p className="text-xs text-slate-400">Finished {b.finishedDate} · {b.totalPages} pages</p></div>
                                    </div>
                                    <button onClick={()=>deleteBook(b.id)} className="text-xs text-red-500 hover:text-red-700 transition px-2">🗑️</button>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {data.books.length===0&&!showAdd&&(
                    <div className="text-center py-16 text-slate-400"><div className="text-5xl mb-3">📚</div><p className="font-medium">No books yet</p><p className="text-sm mt-1">Add your first book above.</p></div>
                )}

                <MonthlyNotes data={data} save={save} noteKey="reading" title="Monthly Reading Notes" today={today} color="focus:border-amber-400" />
            </div>
        );
    }

    // ── WORK VIEW ─────────────────────────────────────────────────────────────
    function WorkView({ data, save, today }) {
        const logs = data.dailyLogs;
        const ws   = getWeekStart(today);
        const wDates = getWeekDates(ws);

        const hoursWk  = wDates.reduce((s,d)=>s+(parseFloat(logs[d]?.workHours)||0),0);
        const hoursMth = Object.entries(logs).filter(([d])=>d.startsWith(today.substring(0,7))).reduce((s,[_,l])=>s+(parseFloat(l.workHours)||0),0);
        const allDays  = Object.entries(logs).filter(([d])=>d>=CHALLENGE_START).filter(([_,l])=>(parseFloat(l.workHours)||0)>0);
        const bestDay  = allDays.length ? Math.max(...allDays.map(([_,l])=>parseFloat(l.workHours)||0)) : 0;

        // Last 14 days
        const last14 = Array.from({length:14},(_,i)=>{
            const d=parseD(today); d.setDate(d.getDate()-13+i);
            const ds=fmtDate(d);
            return {ds,label:parseD(ds).toLocaleDateString('en-US',{weekday:'narrow'}),hours:parseFloat(logs[ds]?.workHours)||0};
        });
        const maxH = Math.max(8,...last14.map(d=>d.hours));

        return (
            <div className="space-y-5">
                <div>
                    <h2 className="text-xl font-bold text-slate-800">💼 Work</h2>
                    <p className="text-sm text-slate-400 mt-0.5">Professional focus — deep work every day</p>
                </div>

                <div className="grid grid-cols-3 gap-3">
                    <StatTile big={`${hoursWk.toFixed(1)}h`} sub="this week" icon="📅" />
                    <StatTile big={`${hoursMth.toFixed(0)}h`} sub="this month" icon="📆" />
                    <StatTile big={`${bestDay}h`} sub="best day" icon="🏆" />
                </div>

                {/* 14-day bars */}
                <div className="bg-white rounded-2xl p-5 border border-slate-100">
                    <p className="font-semibold text-slate-800 mb-4">Last 14 Days</p>
                    <div className="flex gap-1 items-end" style={{height:'90px'}}>
                        {last14.map(d=>{
                            const pct=(d.hours/maxH)*100;
                            const isT=d.ds===today;
                            return (
                                <div key={d.ds} className="flex-1 flex flex-col items-center gap-0.5">
                                    <div className="w-full bg-slate-100 rounded-t relative" style={{height:'72px'}}>
                                        <div className={`absolute bottom-0 w-full rounded-t transition-all ${d.hours>=8?'bg-violet-500':d.hours>0?'bg-violet-300':''}`} style={{height:`${pct}%`}}/>
                                    </div>
                                    <span className={`text-xs ${isT?'font-bold text-violet-600':'text-slate-400'}`}>{d.label}</span>
                                    {d.hours>0&&<span className="text-xs text-violet-500">{d.hours}h</span>}
                                </div>
                            );
                        })}
                    </div>
                </div>

                {/* Monthly breakdown */}
                <div className="bg-white rounded-2xl p-5 border border-slate-100">
                    <p className="font-semibold text-slate-800 mb-4">Monthly Breakdown</p>
                    <div className="space-y-2.5">
                        {MONTHS.map(m=>{
                            const h=Object.entries(logs).filter(([d])=>d.startsWith(m.key)).reduce((s,[_,l])=>s+(parseFloat(l.workHours)||0),0);
                            const isCur=today.startsWith(m.key);
                            const fut=m.key>today.substring(0,7);
                            const days=Object.entries(logs).filter(([d])=>d.startsWith(m.key)&&(parseFloat(logs[d]?.workHours)||0)>0).length;
                            return (
                                <div key={m.key} className={fut?'opacity-30':''}>
                                    <div className="flex justify-between text-xs mb-1">
                                        <span className={isCur?'font-semibold text-violet-700':'text-slate-600'}>{m.label}{isCur?' ← now':''}</span>
                                        <span className={h>0?'text-violet-600 font-semibold':'text-slate-300'}>{h.toFixed(0)}h · {days} days</span>
                                    </div>
                                    <div className="bg-slate-100 rounded-full h-2">
                                        <div className="bg-violet-500 rounded-full h-2 transition-all" style={{width:`${Math.min(100,(h/200)*100)}%`}}/>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>

                <MonthlyNotes data={data} save={save} noteKey="work" title="Monthly Work Notes" today={today} color="focus:border-violet-400" />
            </div>
        );
    }

    // ── WEALTH VIEW ───────────────────────────────────────────────────────────
    function WealthView({ data, save, privacy, today }) {
        const logs = [...(data.netWorthLogs||[])].sort((a,b)=>a.date<b.date?-1:1);
        const [showForm, setShowForm] = useState(false);
        const [form, setForm] = useState({date:fmtDate(new Date()),demat:'',crypto:'',bank:'',creditCard:''});
        const [editDate, setEditDate] = useState(null);

        const latest = logs.length ? logs[logs.length-1] : null;
        const nw     = latest ? calcNW(latest) : null;
        const prev   = logs.length>1 ? logs[logs.length-2] : null;
        const delta  = nw!==null && prev ? nw-calcNW(prev) : null;
        const nwPct  = nw!==null ? Math.min(100,(nw/NW_GOAL)*100) : 0;

        // Reminder on 3rd and 18th of each month
        const period3rd  = `${today.substring(0,7)}-03`;
        const period18th = `${today.substring(0,7)}-18`;
        let showReminder = false;
        if (today >= period3rd && today < period18th) {
            showReminder = !logs.some(l => l.date >= period3rd);
        } else if (today >= period18th) {
            showReminder = !logs.some(l => l.date >= period18th);
        }

        const setF = (k,v) => setForm(f=>({...f,[k]:v}));
        const startAdd = () => { setForm({date:fmtDate(new Date()),demat:'',crypto:'',bank:'',creditCard:''});setEditDate(null);setShowForm(true); };
        const startEdit = e => { setForm({date:e.date,demat:String(e.demat||''),crypto:String(e.crypto||''),bank:String(e.bank||''),creditCard:String(e.creditCard||'')});setEditDate(e.date);setShowForm(true); };
        const saveEntry = () => {
            const entry={date:form.date,demat:parseFloat(form.demat)||0,crypto:parseFloat(form.crypto)||0,bank:parseFloat(form.bank)||0,creditCard:parseFloat(form.creditCard)||0};
            save({...data,netWorthLogs:[...(data.netWorthLogs||[]).filter(l=>l.date!==entry.date),entry]});
            setShowForm(false); setEditDate(null);
        };
        const del = date => save({...data,netWorthLogs:(data.netWorthLogs||[]).filter(l=>l.date!==date)});
        const formNW=(parseFloat(form.demat)||0)+(parseFloat(form.crypto)||0)+(parseFloat(form.bank)||0)-(parseFloat(form.creditCard)||0);

        return (
            <div className="space-y-5">
                <div className="flex justify-between items-center">
                    <div><h2 className="text-xl font-bold text-slate-800">💰 Net Worth</h2><p className="text-sm text-slate-400 mt-0.5">Goal: ₹6L by Aug 31, 2026</p></div>
                    <button onClick={startAdd} className="px-4 py-2 bg-green-600 text-white text-sm rounded-xl font-medium hover:bg-green-700 transition">+ Log Entry</button>
                </div>

                {/* Bimonthly reminder */}
                {showReminder && (
                    <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 flex items-center gap-3">
                        <span className="text-2xl">📊</span>
                        <div className="flex-1">
                            <p className="font-semibold text-amber-800 text-sm">Time to log your net worth</p>
                            <p className="text-xs text-amber-600 mt-0.5">{latest?`Last entry: ${latest.date}`:'Never logged — add your first snapshot.'} Scheduled on the 3rd &amp; 18th.</p>
                        </div>
                        <button onClick={startAdd} className="text-xs bg-amber-500 text-white px-3 py-1.5 rounded-xl font-medium hover:bg-amber-600 transition">Log now</button>
                    </div>
                )}

                {/* Hero card */}
                {nw!==null && (
                    <div className="bg-gradient-to-br from-green-600 to-emerald-700 text-white rounded-2xl p-6">
                        <p className="text-sm opacity-75">Current Net Worth</p>
                        <p className="text-5xl font-bold mt-1">{fmtMoney(nw,privacy)}</p>
                        {delta!==null&&!privacy&&<p className={`text-sm mt-1 ${delta>=0?'opacity-80':'text-red-200'}`}>{delta>=0?'↑':'↓'} {fmtMoney(Math.abs(delta),false)} since last entry</p>}
                        <div className="mt-4">
                            <div className="flex justify-between text-xs opacity-75 mb-1.5">
                                <span>{nwPct.toFixed(0)}% of ₹6L goal</span>
                                <span>{fmtMoney(Math.max(0,NW_GOAL-(nw||0)),privacy)} to go</span>
                            </div>
                            <div className="bg-white/20 rounded-full h-2.5"><div className="bg-white rounded-full h-2.5 transition-all" style={{width:`${nwPct}%`}}/></div>
                        </div>
                        <p className="text-xs opacity-50 mt-3">Last updated: {latest.date}</p>
                    </div>
                )}

                {/* Breakdown */}
                {latest && (
                    <div className="bg-white rounded-2xl p-5 border border-slate-100">
                        <p className="font-semibold text-slate-800 mb-4">Breakdown — {latest.date}</p>
                        <div className="space-y-3">
                            {[
                                {label:'📈 Demat (stocks + MFs)',val:latest.demat||0,color:'bg-blue-500'},
                                {label:'🔶 Crypto',             val:latest.crypto||0,color:'bg-orange-500'},
                                {label:'🏦 Bank balance',       val:latest.bank||0,  color:'bg-emerald-500'},
                            ].map(r=>(
                                <div key={r.label}>
                                    <div className="flex justify-between text-sm mb-1">
                                        <span className="text-slate-600">{r.label}</span>
                                        <span className="font-semibold text-slate-700">{fmtMoney(r.val,privacy)}</span>
                                    </div>
                                    <div className="bg-slate-100 rounded-full h-2"><div className={`${r.color} rounded-full h-2`} style={{width:`${nw>0?Math.min(100,(r.val/nw)*100):0}%`}}/></div>
                                </div>
                            ))}
                            <div className="border-t border-slate-100 pt-3 flex justify-between text-sm">
                                <span className="text-slate-600">💳 Credit card (liability)</span>
                                <span className={`font-semibold ${privacy?'text-slate-400':'text-red-500'}`}>{privacy?'••••':`- ${fmtMoney(latest.creditCard||0,false)}`}</span>
                            </div>
                        </div>
                    </div>
                )}

                {/* Chart */}
                {logs.length>=2 && (
                    <div className="bg-white rounded-2xl p-5 border border-slate-100">
                        <p className="font-semibold text-slate-800 mb-1">Net Worth Over Time</p>
                        <div className="text-xs text-green-600 font-medium mb-4">─ Target ₹6L</div>
                        <NWChart logs={logs} privacy={privacy}/>
                    </div>
                )}

                {/* Log form */}
                {showForm && (
                    <div className="bg-white rounded-2xl p-5 border border-green-200 border-l-4 border-l-green-500">
                        <h3 className="font-semibold text-slate-800 mb-4">{editDate?`Edit — ${editDate}`:'Log Net Worth'}</h3>
                        <div className="space-y-3">
                            <div><label className="text-xs font-medium text-slate-500 block mb-1">Date</label>
                                <input type="date" value={form.date} onChange={e=>setF('date',e.target.value)} className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-green-500"/></div>
                            {[{k:'demat',label:'📈 Demat (stocks + mutual funds)',ph:'e.g. 150000'},{k:'crypto',label:'🔶 Crypto',ph:'e.g. 50000'},{k:'bank',label:'🏦 Bank balance',ph:'e.g. 80000'},{k:'creditCard',label:'💳 Credit card outstanding',ph:'e.g. 20000'}].map(f=>(
                                <div key={f.k}><label className="text-xs font-medium text-slate-500 block mb-1">{f.label}</label>
                                    <div className="flex items-center gap-2"><span className="text-sm text-slate-400">₹</span>
                                        <input type="number" min="0" value={form[f.k]} onChange={e=>setF(f.k,e.target.value)} placeholder={f.ph}
                                            className="flex-1 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-green-500"/></div>
                                </div>
                            ))}
                            <div className={`rounded-xl p-3 text-center ${formNW>=0?'bg-green-50':'bg-red-50'}`}>
                                <p className="text-xs text-slate-500">Net Worth Preview</p>
                                <p className={`text-xl font-bold mt-0.5 ${formNW>=0?'text-green-700':'text-red-600'}`}>{fmtMoney(formNW,false)}</p>
                                <p className="text-xs text-slate-400 mt-0.5">{((formNW/NW_GOAL)*100).toFixed(1)}% of ₹6L</p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={saveEntry} className="flex-1 py-2.5 bg-green-600 text-white text-sm rounded-xl font-medium hover:bg-green-700 transition">Save</button>
                                <button onClick={()=>{setShowForm(false);setEditDate(null);}} className="px-4 py-2.5 bg-slate-100 text-slate-600 text-sm rounded-xl hover:bg-slate-200 transition">Cancel</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* History */}
                {logs.length>0 && (
                    <div className="bg-white rounded-2xl p-5 border border-slate-100">
                        <p className="font-semibold text-slate-800 mb-4">All Entries</p>
                        <div className="space-y-2">
                            {[...logs].reverse().map((entry,idx)=>{
                                const enw=calcNW(entry);
                                const pd=logs[logs.length-2-idx];
                                const d=pd?enw-calcNW(pd):null;
                                return (
                                    <div key={entry.date} className="flex items-center gap-3 p-3 rounded-xl bg-slate-50 hover:bg-slate-100 transition">
                                        <div className="flex-1 min-w-0">
                                            <div className="flex items-center gap-2">
                                                <span className="text-sm font-semibold text-slate-700">{entry.date}</span>
                                                {d!==null&&!privacy&&<span className={`text-xs font-medium ${d>=0?'text-green-600':'text-red-500'}`}>{d>=0?'+':''}{fmtMoney(d,false)}</span>}
                                            </div>
                                            {!privacy&&<div className="text-xs text-slate-400 mt-0.5">D:{fmtMoney(entry.demat||0,false)} · C:{fmtMoney(entry.crypto||0,false)} · B:{fmtMoney(entry.bank||0,false)} · CC:-{fmtMoney(entry.creditCard||0,false)}</div>}
                                        </div>
                                        <div className={`font-bold text-sm ${privacy?'text-slate-400':'text-green-700'}`}>{fmtMoney(enw,privacy)}</div>
                                        <div className="flex gap-1">
                                            <button onClick={()=>startEdit(entry)} className="text-xs text-blue-500 border border-blue-200 px-2 py-1 rounded-lg hover:bg-blue-50 transition">Edit</button>
                                            <button onClick={()=>del(entry.date)} className="text-xs text-red-400 border border-red-200 px-2 py-1 rounded-lg hover:bg-red-50 transition">✕</button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                )}

                {logs.length===0&&!showForm&&(
                    <div className="text-center py-16 text-slate-400"><div className="text-5xl mb-3">💰</div><p className="font-medium">No entries yet</p><p className="text-sm mt-1">Log your first snapshot to start tracking.</p></div>
                )}

                <MonthlyNotes data={data} save={save} noteKey="wealth" title="Monthly Wealth Notes" today={today} color="focus:border-green-400" />
            </div>
        );
    }

    // ── SHARED COMPONENTS ─────────────────────────────────────────────────────
    function MiniBar({ pct }) {
        return <div className="mt-2 bg-slate-200 rounded-full h-1.5"><div className="bg-slate-700 rounded-full h-1.5" style={{width:`${Math.min(100,pct)}%`}}/></div>;
    }
    function HBar({ label, val, max, color, unit='', dec=0 }) {
        const pct=Math.min(100,(val/max)*100), done=val>=max;
        return (
            <div>
                <div className="flex justify-between text-sm mb-1">
                    <span className="text-slate-600">{label}</span>
                    <span className={`font-semibold ${done?'text-emerald-600':'text-slate-500'}`}>{dec?val.toFixed(dec):val}{unit}/{max}{unit}{done?' ✓':''}</span>
                </div>
                <div className="bg-slate-100 rounded-full h-2"><div className={`${color} rounded-full h-2 transition-all`} style={{width:`${pct}%`}}/></div>
            </div>
        );
    }
    function Section({ title, accent, children }) {
        return (
            <div className={`bg-white rounded-2xl p-5 border border-slate-100 border-l-4 ${accent}`}>
                <h3 className="font-semibold text-slate-800 mb-4">{title}</h3>
                <div className="space-y-2">{children}</div>
            </div>
        );
    }
    function Toggle({ checked, onChange, label, sub, warn }) {
        return (
            <div className={`flex items-center gap-3 p-4 rounded-xl cursor-pointer select-none transition-colors ${checked?(warn?'bg-orange-50':'bg-emerald-50'):'bg-slate-50 hover:bg-slate-100'}`} onClick={onChange}>
                <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 ${checked?(warn?'bg-orange-400 border-orange-400':'bg-emerald-500 border-emerald-500'):'border-slate-300'}`}>
                    {checked&&<span className="text-white text-xs font-bold">✓</span>}
                </div>
                <div>
                    <p className={`text-sm font-medium leading-tight ${checked?(warn?'text-orange-700':'text-emerald-700'):'text-slate-700'}`}>{label}</p>
                    {sub&&<p className="text-xs text-slate-400">{sub}</p>}
                </div>
            </div>
        );
    }
    function StatTile({ big, sub, icon, bright }) {
        return (
            <div className={`rounded-2xl p-4 text-center border ${bright?'bg-orange-50 border-orange-100':'bg-slate-50 border-slate-100'}`}>
                {icon&&<div className="text-xl mb-1">{icon}</div>}
                <div className={`text-2xl font-bold ${bright?'text-orange-600':'text-slate-800'}`}>{big}</div>
                <div className="text-xs text-slate-400 mt-0.5">{sub}</div>
            </div>
        );
    }

    function WeightChart({ entries }) {
        const ref=useRef(null), ch=useRef(null);
        useEffect(()=>{
            if(!ref.current)return; if(ch.current)ch.current.destroy();
            const labels=entries.map(([d])=>parseD(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}));
            const weights=entries.map(([_,l])=>l.weight);
            const mn=Math.max(60,Math.min(...weights)-3);
            ch.current=new Chart(ref.current,{type:'line',data:{labels,datasets:[
                {label:'Weight',data:weights,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.07)',tension:0.4,fill:true,pointRadius:3,pointBackgroundColor:'#10b981'},
                {label:'78kg',data:Array(labels.length).fill(78),borderColor:'#f59e0b',borderDash:[6,3],pointRadius:0,fill:false},
                {label:'81kg',data:Array(labels.length).fill(81),borderColor:'#8b5cf6',borderDash:[4,4],pointRadius:0,fill:false},
            ]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{mode:'index'}},scales:{y:{min:mn,grid:{color:'#f1f5f9'},ticks:{callback:v=>`${v}kg`}},x:{grid:{display:false},ticks:{maxRotation:0,maxTicksLimit:8}}}}});
            return ()=>ch.current?.destroy();
        },[entries]);
        return <canvas ref={ref} height="180"/>;
    }

    function NWChart({ logs, privacy }) {
        const ref=useRef(null), ch=useRef(null);
        useEffect(()=>{
            if(!ref.current)return; if(ch.current)ch.current.destroy();
            const labels=logs.map(e=>parseD(e.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}));
            const nwVals=logs.map(e=>calcNW(e));
            const mn=Math.max(0,Math.min(...nwVals)-50000);
            ch.current=new Chart(ref.current,{type:'line',data:{labels,datasets:[
                {label:'Net Worth',data:privacy?nwVals.map(()=>null):nwVals,borderColor:'#16a34a',backgroundColor:'rgba(22,163,74,0.08)',tension:0.4,fill:true,pointRadius:4,pointBackgroundColor:'#16a34a'},
                {label:'₹6L',data:Array(labels.length).fill(NW_GOAL),borderColor:'#f59e0b',borderDash:[6,3],pointRadius:0,fill:false},
            ]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`₹${ctx.raw?.toLocaleString('en-IN')||''}`}}},scales:{y:{min:mn,grid:{color:'#f1f5f9'},ticks:{callback:v=>v>=100000?`₹${(v/100000).toFixed(1)}L`:`₹${(v/1000).toFixed(0)}k`}},x:{grid:{display:false},ticks:{maxRotation:0,maxTicksLimit:8}}}}});
            return ()=>ch.current?.destroy();
        },[logs,privacy]);
        if(privacy)return <div className="py-8 text-center text-slate-400 text-sm">Numbers hidden — toggle to see chart.</div>;
        return <canvas ref={ref} height="180"/>;
    }

    function MonthlyNotes({ data, save, noteKey, title, today, color }) {
        const [editKey, setEditKey] = useState(null);
        const [editText, setEditText] = useState('');
        const cur = today.substring(0,7);
        return (
            <div className="bg-white rounded-2xl p-5 border border-slate-100">
                <p className="font-semibold text-slate-800 mb-4">{title}</p>
                <div className="space-y-2">
                    {MONTHS.map(m=>{
                        const note = data.monthlyNotes?.[m.key]?.[noteKey]||'';
                        const isCur=m.key===cur, fut=m.key>cur, isEd=editKey===m.key;
                        return (
                            <div key={m.key} className={`rounded-xl border p-3 transition ${isCur?'border-blue-200 bg-blue-50':'border-slate-100'} ${fut?'opacity-30':''}`}>
                                <div className="flex justify-between items-center">
                                    <span className={`text-sm font-medium ${isCur?'text-blue-700':'text-slate-700'}`}>{m.label}{isCur?' ← now':''}</span>
                                    <button onClick={()=>{if(isEd){setEditKey(null);}else{setEditText(note);setEditKey(m.key);}}}
                                        className="text-xs text-blue-600 border border-blue-200 px-2 py-0.5 rounded-lg hover:bg-blue-50 transition">
                                        {isEd?'Cancel':'Edit'}
                                    </button>
                                </div>
                                {isEd?(
                                    <div className="mt-2 space-y-2">
                                        <textarea rows="2" value={editText} onChange={e=>setEditText(e.target.value)}
                                            placeholder="Your focus for this month…"
                                            className={`w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none resize-none ${color}`}/>
                                        <button onClick={()=>{
                                            const existing=data.monthlyNotes?.[m.key]||{};
                                            save({...data,monthlyNotes:{...(data.monthlyNotes||{}),[m.key]:{...existing,[noteKey]:editText}}});
                                            setEditKey(null);
                                        }} className="w-full py-2 bg-blue-600 text-white text-sm rounded-xl font-medium hover:bg-blue-700 transition">Save</button>
                                    </div>
                                ):note?(
                                    <p className="text-sm text-slate-600 mt-1.5 leading-relaxed">{note}</p>
                                ):(
                                    <p className="text-xs text-slate-400 mt-1 italic">No notes yet — click Edit to add.</p>
                                )}
                            </div>
                        );
                    })}
                </div>
            </div>
        );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
